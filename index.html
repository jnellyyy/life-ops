<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Ops</title>
<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:24px;
  margin:0;
}
.wrap{
  max-width:700px;
  margin:0 auto;
}
.card{
  background:#1b1b1b;
  border:1px solid #333;
  border-radius:16px;
  padding:20px;
  margin-top:16px;
}
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  font:inherit;
  box-sizing:border-box;
}
input{
  background:#0f0f0f;
  color:#fff;
  border:1px solid #333;
}
button{
  background:#d41425;
  color:#fff;
  border:none;
  font-weight:700;
  cursor:pointer;
}
.secondary{
  background:#333;
}
.notice{
  color:#bbb;
  white-space:pre-wrap;
}
.hidden{
  display:none !important;
}
.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:16px;
}
.tab-btn{
  background:#333;
  color:#fff;
  border:none;
  padding:12px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}
.tab-btn.active{
  background:#d41425;
}
.tab-panel{
  display:none;
}
.tab-panel.active{
  display:block;
}
@media (max-width:700px){
  .tabs{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>
<body>
<div class="wrap">

  <div id="authBox" class="card">
    <h1>Life Ops</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signUpBtn" type="button">Sign Up</button>
    <button id="signInBtn" class="secondary" type="button">Sign In</button>
    <p id="msg" class="notice"></p>
  </div>

  <div id="appBox" class="card hidden">
    <h2>Life Ops</h2>
    <p id="sessionText" class="notice"></p>
    <button id="signOutBtn" class="secondary" type="button">Log Out</button>

    <div class="tabs">
      <button class="tab-btn active" type="button" data-tab="life">Life</button>
      <button class="tab-btn" type="button" data-tab="finance">Finance</button>
      <button class="tab-btn" type="button" data-tab="attendance">Attendance</button>
      <button class="tab-btn" type="button" data-tab="bookings">Bookings</button>
    </div>

    <div id="life" class="tab-panel active">
      <p>Life tab ready.</p>
    </div>

    <div id="finance" class="tab-panel">
      <p>Finance tab ready.</p>
    </div>

    <div id="attendance" class="tab-panel">
      <p>Attendance tab ready.</p>
    </div>

    <div id="bookings" class="tab-panel">
      <p>Bookings tab ready.</p>
    </div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const msgEl = document.getElementById("msg");
const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");
const sessionText = document.getElementById("sessionText");

function setMsg(text){
  msgEl.textContent = text;
}

function showTab(tabName){
  document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));

  const panel = document.getElementById(tabName);
  const btn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);

  if(panel) panel.classList.add("active");
  if(btn) btn.classList.add("active");
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => showTab(btn.dataset.tab));
});

async function refreshSessionUI(){
  const { data: sessionData } = await supabase.auth.getSession();
  const session = sessionData?.session || null;

  if (session) {
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    sessionText.textContent =
      `User: ${session.user.email}\n` +
      `Session present: yes`;
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
    sessionText.textContent = "";
  }
}

document.getElementById("signUpBtn").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passwordEl.value;

  if (!email || !password) {
    setMsg("Enter email and password.");
    return;
  }

  const { data, error } = await supabase.auth.signUp({ email, password });

  if (error) {
    setMsg(`Sign up error: ${error.message}`);
    return;
  }

  setMsg(
    `Sign up ok.\n` +
    `User created: ${data.user ? "yes" : "no"}\n` +
    `Session returned: ${data.session ? "yes" : "no"}`
  );

  await refreshSessionUI();
});

document.getElementById("signInBtn").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passwordEl.value;

  if (!email || !password) {
    setMsg("Enter email and password.");
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    setMsg(`Sign in error: ${error.message}`);
    return;
  }

  setMsg(
    `Sign in ok.\n` +
    `Session returned: ${data.session ? "yes" : "no"}\n` +
    `User returned: ${data.user ? "yes" : "no"}`
  );

  await refreshSessionUI();
});

document.getElementById("signOutBtn").addEventListener("click", async () => {
  const { error } = await supabase.auth.signOut();
  setMsg(error ? `Sign out error: ${error.message}` : "Signed out.");
  await refreshSessionUI();
});

supabase.auth.onAuthStateChange(async () => {
  await refreshSessionUI();
});

await refreshSessionUI();
</script>
</body>
</html>
