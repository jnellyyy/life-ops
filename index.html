<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Ops Auth Test</title>
<style>
body{background:#111;color:#fff;font-family:Arial,sans-serif;padding:24px;margin:0}
.wrap{max-width:520px;margin:0 auto}
.card{background:#1b1b1b;border:1px solid #333;border-radius:16px;padding:20px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;font:inherit;box-sizing:border-box}
input{background:#0f0f0f;color:#fff;border:1px solid #333}
button{background:#d41425;color:#fff;border:none;font-weight:700;cursor:pointer}
.secondary{background:#333}
.notice{color:#bbb;white-space:pre-wrap}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div id="authBox" class="card">
    <h1>Auth test</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signUpBtn" type="button">Sign Up</button>
    <button id="signInBtn" class="secondary" type="button">Sign In</button>
    <button id="signOutBtn" class="secondary" type="button">Sign Out</button>
    <p id="msg" class="notice"></p>
  </div>

  <div id="appBox" class="card hidden">
    <h2>Signed in</h2>
    <p id="sessionText" class="notice"></p>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const msgEl = document.getElementById("msg");
const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");
const sessionText = document.getElementById("sessionText");

function setMsg(text){
  msgEl.textContent = text;
}

async function refreshSessionUI(){
  const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
  const { data: userData, error: userError } = await supabase.auth.getUser();

  const session = sessionData?.session || null;
  const user = userData?.user || null;

  if (session && user) {
    authBox.classList.remove("hidden");
    appBox.classList.remove("hidden");
    sessionText.textContent =
      `User: ${user.email}\n` +
      `User ID: ${user.id}\n` +
      `Session present: yes`;
  } else {
    appBox.classList.add("hidden");
    sessionText.textContent = "";
  }

  if (sessionError) setMsg(`Session error: ${sessionError.message}`);
  if (userError) setMsg(`User error: ${userError.message}`);
}

document.getElementById("signUpBtn").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passwordEl.value;

  if (!email || !password) {
    setMsg("Enter email and password.");
    return;
  }

  const { data, error } = await supabase.auth.signUp({ email, password });

  if (error) {
    setMsg(`Sign up error: ${error.message}`);
    return;
  }

  setMsg(
    `Sign up ok.\n` +
    `User created: ${data.user ? "yes" : "no"}\n` +
    `Session returned: ${data.session ? "yes" : "no"}`
  );

  await refreshSessionUI();
});

document.getElementById("signInBtn").addEventListener("click", async () => {
  const email = emailEl.value.trim();
  const password = passwordEl.value;

  if (!email || !password) {
    setMsg("Enter email and password.");
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    setMsg(`Sign in error: ${error.message}`);
    return;
  }

  setMsg(
    `Sign in ok.\n` +
    `Session returned: ${data.session ? "yes" : "no"}\n` +
    `User returned: ${data.user ? "yes" : "no"}`
  );

  await refreshSessionUI();
});

document.getElementById("signOutBtn").addEventListener("click", async () => {
  const { error } = await supabase.auth.signOut();
  setMsg(error ? `Sign out error: ${error.message}` : "Signed out.");
  await refreshSessionUI();
});

supabase.auth.onAuthStateChange(async () => {
  await refreshSessionUI();
});

await refreshSessionUI();
</script>
</body>
</html>
