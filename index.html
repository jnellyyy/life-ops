<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Ops</title>
<style>
:root{
  --bg:#0d0d10;
  --card:#17171c;
  --card2:#1f1f26;
  --line:#2d2d36;
  --text:#f5f5f7;
  --muted:#a1a1aa;
  --accent:#d41425;
  --accent2:#2a2a32;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(180deg,#0b0b0d 0%, #121216 100%);
  color:var(--text);
  font-family:Arial,sans-serif;
  padding:20px;
}
.wrap{max-width:1000px;margin:0 auto}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-top:18px;
}
h1,h2,h3,p{margin-top:0}
.sub,.meta,.notice,.empty{color:var(--muted)}
.input,.select,.button{
  width:100%;
  font:inherit;
  border-radius:12px;
  box-sizing:border-box;
}
.input,.select{
  background:#101015;
  color:var(--text);
  border:1px solid #31313a;
  padding:13px 14px;
  margin-top:10px;
}
.button{
  background:var(--accent);
  color:#fff;
  border:none;
  padding:13px 14px;
  margin-top:10px;
  font-weight:700;
  cursor:pointer;
}
.button.secondary{background:var(--accent2)}
.hidden{display:none !important}
.topbar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  align-items:flex-start;
}
.logout-btn{
  width:auto;
  margin-top:0;
  padding:10px 14px;
}
.tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:16px;
}
.tab-btn{
  background:var(--accent2);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  cursor:pointer;
}
.tab-btn.active{background:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.row-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:14px;
  border-radius:14px;
  background:var(--card2);
  border:1px solid #31313a;
  margin-top:10px;
}
.left{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:0;
}
.checkbox{
  width:20px;
  height:20px;
  margin:0;
}
.title{
  font-size:16px;
  word-break:break-word;
}
.title.done{
  text-decoration:line-through;
  opacity:.55;
}
.mini{
  width:auto;
  margin:0;
  padding:9px 12px;
  border-radius:10px;
  background:#34343d;
  color:#fff;
  border:none;
  cursor:pointer;
  font-size:13px;
  font-weight:700;
}
@media (max-width:760px){
  .tabs{grid-template-columns:repeat(2,1fr)}
  .row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="wrap">

  <div id="authBox" class="card">
    <h1>Life Ops</h1>
    <p class="sub">Sign in once, then use the tabs.</p>

    <input id="email" class="input" type="email" placeholder="Email">
    <input id="password" class="input" type="password" placeholder="Password">

    <button id="signUpBtn" class="button" type="button">Sign Up</button>
    <button id="signInBtn" class="button secondary" type="button">Sign In</button>

    <p id="msg" class="notice"></p>
  </div>

  <div id="appBox" class="hidden">
    <div class="card">
      <div class="topbar">
        <div>
          <h1 style="margin-bottom:6px;">Life Ops</h1>
          <p id="sessionText" class="meta">Signed in</p>
        </div>
        <button id="logoutBtn" class="button secondary logout-btn" type="button">Log out</button>
      </div>

      <div class="tabs">
        <button class="tab-btn active" type="button" data-tab="life">Life</button>
        <button class="tab-btn" type="button" data-tab="finance">Finance</button>
        <button class="tab-btn" type="button" data-tab="attendance">Attendance</button>
        <button class="tab-btn" type="button" data-tab="bookings">Bookings</button>
      </div>
    </div>

    <div id="life" class="card tab-panel active">
      <h2>To do</h2>
      <div class="row">
        <input id="taskInput" class="input" placeholder="Add task">
        <button id="addTaskBtn" class="button" type="button">Add task</button>
      </div>
      <p id="taskMsg" class="notice"></p>
      <div id="taskList"></div>
    </div>

    <div id="finance" class="card tab-panel">
      <h2>Finance</h2>
      <div class="row">
        <input id="amount" class="input" type="number" placeholder="Amount">
        <input id="financeNote" class="input" placeholder="Note">
      </div>
      <button id="addFinanceBtn" class="button" type="button">Save finance</button>
      <p id="financeMsg" class="notice"></p>
      <div id="financeList"></div>
    </div>

    <div id="attendance" class="card tab-panel">
      <h2>Attendance</h2>
      <div class="row">
        <input id="attDate" class="input" type="date">
        <select id="attStatus" class="select">
          <option>Office</option>
          <option>WFH</option>
          <option>Sick</option>
          <option>Holiday</option>
        </select>
      </div>
      <button id="addAttendanceBtn" class="button" type="button">Save attendance</button>
      <p id="attMsg" class="notice"></p>
      <div id="attList"></div>
    </div>

    <div id="bookings" class="card tab-panel">
      <h2>Bookings</h2>
      <div class="row">
        <input id="clientInput" class="input" placeholder="Client name">
        <select id="bookingStatus" class="select">
          <option>Enquiry</option>
          <option>Pending</option>
          <option>Booked</option>
          <option>Completed</option>
        </select>
      </div>
      <button id="addBookingBtn" class="button" type="button">Save booking</button>
      <p id="bookMsg" class="notice"></p>
      <div id="bookList"></div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");
const msg = document.getElementById("msg");
const sessionText = document.getElementById("sessionText");

const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const signUpBtn = document.getElementById("signUpBtn");
const signInBtn = document.getElementById("signInBtn");
const logoutBtn = document.getElementById("logoutBtn");

const taskInput = document.getElementById("taskInput");
const addTaskBtn = document.getElementById("addTaskBtn");
const taskMsg = document.getElementById("taskMsg");
const taskList = document.getElementById("taskList");

const amountInput = document.getElementById("amount");
const financeNoteInput = document.getElementById("financeNote");
const addFinanceBtn = document.getElementById("addFinanceBtn");
const financeMsg = document.getElementById("financeMsg");
const financeList = document.getElementById("financeList");

const attDate = document.getElementById("attDate");
const attStatus = document.getElementById("attStatus");
const addAttendanceBtn = document.getElementById("addAttendanceBtn");
const attMsg = document.getElementById("attMsg");
const attList = document.getElementById("attList");

const clientInput = document.getElementById("clientInput");
const bookingStatus = document.getElementById("bookingStatus");
const addBookingBtn = document.getElementById("addBookingBtn");
const bookMsg = document.getElementById("bookMsg");
const bookList = document.getElementById("bookList");

function setAuthMessage(text){
  msg.textContent = text;
}

async function getCurrentUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function showTab(tabName){
  document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  document.getElementById(tabName).classList.add("active");
  document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add("active");
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => showTab(btn.dataset.tab));
});

async function showAppForSession(){
  const { data } = await supabase.auth.getSession();
  const session = data.session;

  if(session){
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    sessionText.textContent = session.user?.email || "Signed in";
    await loadAll();
  } else {
    appBox.classList.add("hidden");
    authBox.classList.remove("hidden");
  }
}

signUpBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if(!email || !password){
    setAuthMessage("Enter email and password.");
    return;
  }

  const { error } = await supabase.auth.signUp({ email, password });
  setAuthMessage(error ? error.message : "Signed up. Now sign in.");
});

signInBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  if(!email || !password){
    setAuthMessage("Enter email and password.");
    return;
  }

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });

  if(error){
    setAuthMessage(error.message || "Sign in failed.");
    return;
  }

  if(!data.session){
    setAuthMessage("No session returned.");
    return;
  }

  setAuthMessage("");
  await showAppForSession();
});

logoutBtn.addEventListener("click", async () => {
  const { error } = await supabase.auth.signOut();
  if(error){
    setAuthMessage(error.message);
    return;
  }
  authBox.classList.remove("hidden");
  appBox.classList.add("hidden");
  setAuthMessage("Signed out.");
});

/* TASKS */
addTaskBtn.addEventListener("click", async () => {
  const user = await getCurrentUser();
  const title = taskInput.value.trim();

  if(!user){
    taskMsg.textContent = "You are not signed in.";
    return;
  }
  if(!title){
    taskMsg.textContent = "Enter a task.";
    return;
  }

  const { error } = await supabase.from("tasks").insert([{
    user_id: user.id,
    title,
    status: "open"
  }]);

  if(error){
    taskMsg.textContent = error.message;
    return;
  }

  taskInput.value = "";
  taskMsg.textContent = "";
  await loadTasks();
});

window.toggleTask = async (id, currentStatus) => {
  const nextStatus = currentStatus === "done" ? "open" : "done";
  const { error } = await supabase.from("tasks").update({ status: nextStatus }).eq("id", id);
  if(error){
    taskMsg.textContent = error.message;
    return;
  }
  await loadTasks();
};

window.deleteTask = async (id) => {
  const { error } = await supabase.from("tasks").delete().eq("id", id);
  if(error){
    taskMsg.textContent = error.message;
    return;
  }
  await loadTasks();
};

async function loadTasks(){
  const user = await getCurrentUser();
  if(!user){
    taskList.innerHTML = `<div class="empty">Sign in to see tasks.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("tasks")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  if(error){
    taskMsg.textContent = error.message;
    return;
  }

  if(!data || data.length === 0){
    taskList.innerHTML = `<div class="empty">No tasks yet.</div>`;
    return;
  }

  taskList.innerHTML = data.map(task => `
    <div class="row-item">
      <div class="left">
        <input class="checkbox" type="checkbox" ${task.status === "done" ? "checked" : ""} onchange="toggleTask('${task.id}','${task.status}')">
        <div class="title ${task.status === "done" ? "done" : ""}">${task.title || ""}</div>
      </div>
      <button class="mini" type="button" onclick="deleteTask('${task.id}')">Delete</button>
    </div>
  `).join("");
}

/* FINANCE */
addFinanceBtn.addEventListener("click", async () => {
  const user = await getCurrentUser();
  const amountValue = Number(amountInput.value || 0);
  const noteValue = financeNoteInput.value.trim();

  if(!user){
    financeMsg.textContent = "You are not signed in.";
    return;
  }
  if(!amountValue){
    financeMsg.textContent = "Enter an amount.";
    return;
  }

  const { error } = await supabase.from("finance").insert([{
    user_id: user.id,
    amount: amountValue,
    note: noteValue
  }]);

  if(error){
    financeMsg.textContent = error.message;
    return;
  }

  amountInput.value = "";
  financeNoteInput.value = "";
  financeMsg.textContent = "";
  await loadFinance();
});

async function loadFinance(){
  const user = await getCurrentUser();
  if(!user){
    financeList.innerHTML = `<div class="empty">Sign in to see finance.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("finance")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  if(error){
    financeMsg.textContent = error.message;
    return;
  }

  if(!data || data.length === 0){
    financeList.innerHTML = `<div class="empty">No finance entries yet.</div>`;
    return;
  }

  financeList.innerHTML = data.map(row => `
    <div class="row-item">
      <div class="left">
        <div>${Number(row.amount || 0).toFixed(2)} · ${row.note || ""}</div>
      </div>
    </div>
  `).join("");
}

/* ATTENDANCE */
addAttendanceBtn.addEventListener("click", async () => {
  const user = await getCurrentUser();
  if(!user){
    attMsg.textContent = "You are not signed in.";
    return;
  }

  const { error } = await supabase.from("attendance").insert([{
    user_id: user.id,
    entry_date: attDate.value,
    status: attStatus.value
  }]);

  if(error){
    attMsg.textContent = error.message;
    return;
  }

  attMsg.textContent = "";
  await loadAttendance();
});

async function loadAttendance(){
  const user = await getCurrentUser();
  if(!user){
    attList.innerHTML = `<div class="empty">Sign in to see attendance.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("attendance")
    .select("*")
    .eq("user_id", user.id)
    .order("entry_date", { ascending: false });

  if(error){
    attMsg.textContent = error.message;
    return;
  }

  if(!data || data.length === 0){
    attList.innerHTML = `<div class="empty">No attendance saved yet.</div>`;
    return;
  }

  attList.innerHTML = data.map(row => `
    <div class="row-item">
      <div class="left">
        <div>${row.entry_date || ""} · ${row.status || ""}</div>
      </div>
    </div>
  `).join("");
}

/* BOOKINGS */
addBookingBtn.addEventListener("click", async () => {
  const user = await getCurrentUser();
  const clientValue = clientInput.value.trim();

  if(!user){
    bookMsg.textContent = "You are not signed in.";
    return;
  }
  if(!clientValue){
    bookMsg.textContent = "Enter a client name.";
    return;
  }

  const { error } = await supabase.from("bookings").insert([{
    user_id: user.id,
    client_name: clientValue,
    status: bookingStatus.value
  }]);

  if(error){
    bookMsg.textContent = error.message;
    return;
  }

  clientInput.value = "";
  bookMsg.textContent = "";
  await loadBookings();
});

async function loadBookings(){
  const user = await getCurrentUser();
  if(!user){
    bookList.innerHTML = `<div class="empty">Sign in to see bookings.</div>`;
    return;
  }

  const { data, error } = await supabase
    .from("bookings")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  if(error){
    bookMsg.textContent = error.message;
    return;
  }

  if(!data || data.length === 0){
    bookList.innerHTML = `<div class="empty">No bookings yet.</div>`;
    return;
  }

  bookList.innerHTML = data.map(row => `
    <div class="row-item">
      <div class="left">
        <div>${row.client_name || ""} · ${row.status || ""}</div>
      </div>
    </div>
  `).join("");
}

async function loadAll(){
  await loadTasks();
  await loadFinance();
  await loadAttendance();
  await loadBookings();
}

supabase.auth.onAuthStateChange(async () => {
  await showAppForSession();
});

await showAppForSession();
</script>
</body>
</html>
