<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Ops</title>

<style>
body{background:#0e0e0e;color:#fff;font-family:Arial;padding:20px;margin:0}
.wrap{max-width:760px;margin:auto}
.card{background:#1b1b1b;padding:20px;border-radius:12px;margin-top:20px}
input,button,select{width:100%;padding:12px;margin-top:10px;border-radius:8px}
input,select{background:#111;color:#fff;border:1px solid #333}
button{background:#c1121f;color:#fff;border:none;font-weight:700}
.hidden{display:none}
.tabs{display:flex;gap:8px;margin-top:10px}
.tabs button{flex:1;background:#333}
.tabs .active{background:#c1121f}
.item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #333}

<body>

<div class="wrap">

<div id="authBox" class="card">
<h1>Life Ops</h1>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Sign In</button>
<p id="msg"></p>
</div>

<div id="appBox" class="hidden">

<div class="card">
<button onclick="logout()">Log out</button>

<div class="tabs">
<button class="active" onclick="showTab('life',this)">Life</button>
<button onclick="showTab('finance',this)">Finance</button>
<button onclick="showTab('attendance',this)">Attendance</button>
<button onclick="showTab('bookings',this)">Bookings</button>
</div>
</div>

<!-- LIFE -->
<div id="life" class="card tab">
<h3>To Do</h3>
<input id="taskInput" placeholder="Add task">
<button onclick="addTask()">Add Task</button>
<div id="taskList"></div>
</div>

</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

/* AUTO LOGIN */
async function checkUser(){
  const { data } = await supabase.auth.getSession();
  if(data.session){
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    loadTasks();
  }
}
checkUser();

/* AUTH */
window.signUp=async()=>{
  const {error}=await supabase.auth.signUp({
    email:email.value,
    password:password.value
  });
  msg.innerText=error?error.message:"Signed up";
};

window.signIn=async()=>{
  const {error}=await supabase.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });
  if(error){msg.innerText=error.message;return;}
  location.reload();
};

window.logout=async()=>{
  await supabase.auth.signOut();
  location.reload();
};

/* TASKS */
window.addTask = async () => {
  const user = (await supabase.auth.getUser()).data.user;

  if(!taskInput.value) return;

  await supabase.from("tasks").insert([{
    user_id: user.id,
    title: taskInput.value,
    status: "open"
  }]);

  taskInput.value="";
  loadTasks();
};

window.toggleTask = async (id, status) => {
  const newStatus = status==="done" ? "open" : "done";

  await supabase.from("tasks")
    .update({status:newStatus})
    .eq("id",id);

  loadTasks();
};

window.deleteTask = async (id) => {
  await supabase.from("tasks")
    .delete()
    .eq("id",id);

  loadTasks();
};

async function loadTasks(){
  const user = (await supabase.auth.getUser()).data.user;

  const {data}=await supabase
    .from("tasks")
    .select("*")
    .eq("user_id",user.id)
    .order("created_at",{ascending:false});

  taskList.innerHTML = data.map(t => `
    <div class="item">
      <div>
        <input type="checkbox" ${t.status==="done"?"checked":""}
        onchange="toggleTask('${t.id}','${t.status}')">
        <span class="${t.status==="done"?"done":""}">
          ${t.title}
        </span>
      </div>
      <button class="del" onclick="deleteTask('${t.id}')">Delete</button>
    </div>
  `).join("");
}
</script>

</body>

<script type="module">

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

/* TABS */
window.showTab=(t,b)=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.add('hidden'));
  document.getElementById(t).classList.remove('hidden');
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
};

/* AUTH */
window.signUp=async()=>{
  const {error}=await supabase.auth.signUp({
    email:email.value,
    password:password.value
  });
  msg.innerText=error?error.message:"Signed up → now sign in";
};

window.signIn=async()=>{
  const {error}=await supabase.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });
  if(error){msg.innerText=error.message;return;}
  authBox.classList.add("hidden");
  appBox.classList.remove("hidden");
  loadAll();
};

window.logout=async()=>{
  await supabase.auth.signOut();
  location.reload();
};

/* LOAD ALL */
async function loadAll(){
  loadTasks();
  loadFinance();
  loadAttendance();
  loadBookings();
}

/* TASKS (WITH CHECKBOX) */
window.addTask = async () => {
  const user = (await supabase.auth.getUser()).data.user;
  const value = taskInput.value.trim();

  if (!value) {
    taskMsg.innerText = "Enter a task";
    return;
  }

  const { error } = await supabase
    .from("tasks")
    .insert([{
      user_id: user.id,
      title: value,
      status: "open"
    }]);

  if (error) {
    taskMsg.innerText = error.message;
    return;
  }

  taskInput.value = "";
  loadTasks();
};

window.toggleTask = async (id, currentStatus) => {
  const newStatus = currentStatus === "done" ? "open" : "done";

  const { error } = await supabase
    .from("tasks")
    .update({ status: newStatus })
    .eq("id", id);

  if (error) {
    alert(error.message);
    return;
  }

  loadTasks();
};

async function loadTasks() {
  const user = (await supabase.auth.getUser()).data.user;

  const { data, error } = await supabase
    .from("tasks")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending: false });

  if (error) {
    taskMsg.innerText = error.message;
    return;
  }

  taskList.innerHTML = data.map(t => `
    <div class="item">
      <label style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" ${t.status === "done" ? "checked" : ""} 
        onchange="toggleTask('${t.id}','${t.status}')">
        <span style="${t.status === "done" ? "text-decoration:line-through;opacity:0.6;" : ""}">
          ${t.title}
        </span>
      </label>
    </div>
  `).join("");
}

/* FINANCE */
let currentBudget = 0;

window.saveBudget = async () => {
  const user = (await supabase.auth.getUser()).data.user;
  const value = Number(budgetInput.value || 0);

  if (!value) {
    budgetMsg.innerText = "Enter a budget amount";
    return;
  }

  const { error } = await supabase
    .from("finance")
    .insert([{
      user_id: user.id,
      amount: 0,
      category: "BUDGET",
      note: String(value)
    }]);

  if (error) {
    budgetMsg.innerText = error.message;
    return;
  }

  budgetInput.value = "";
  loadFinance();
};

window.addFinance = async () => {
  const user = (await supabase.auth.getUser()).data.user;

  const { error } = await supabase
    .from("finance")
    .insert([{
      user_id: user.id,
      amount: amount.value,
      category: category.value,
      note: financeNote.value
    }]);

  if (error) {
    financeMsg.innerText = error.message;
    return;
  }

  amount.value="";
  category.value="";
  financeNote.value="";
  loadFinance();
};

async function loadFinance(){
  const user = (await supabase.auth.getUser()).data.user;

  const { data } = await supabase
    .from('finance')
    .select('*')
    .eq('user_id', user.id);

  const now = new Date();
  const month = now.getMonth();
  const year = now.getFullYear();

  const monthRows = data.filter(f=>{
    const d=new Date(f.created_at);
    return d.getMonth()===month && d.getFullYear()===year;
  });

  const budgetRow = monthRows.find(f=>f.category==="BUDGET");
  const budget = budgetRow ? Number(budgetRow.note) : 0;

  const spent = monthRows
    .filter(f=>f.category!=="BUDGET")
    .reduce((sum,f)=>sum+Number(f.amount||0),0);

  const left = budget - spent;

  monthSpent.innerText = spent.toFixed(2);
  monthBudget.innerText = budget.toFixed(2);
  moneyLeft.innerText = left.toFixed(2);

  if(!budget){
    budgetStatus.innerText="No budget";
  } else if(left>=0){
    budgetStatus.innerText="On track";
    budgetStatus.className="ok";
  } else {
    budgetStatus.innerText="Over budget";
    budgetStatus.className="bad";
  }

  financeList.innerHTML = monthRows
    .filter(f=>f.category!=="BUDGET")
    .map(f=>`<div class="item">£${f.amount} - ${f.category}</div>`)
    .join("");
}

/* ATTENDANCE */
window.addAttendance=async()=>{

  await supabase.from('attendance').insert([{
    user_id:user.id,
    date:attDate.value,
    status:attStatus.value
  }]);

async function loadAttendance(){

    .from('attendance')
    .select('*')
    .eq('user_id', user.id);

  attList.innerHTML=data.map(a=>`<div>${a.date} - ${a.status}</div>`).join("");
}

/* BOOKINGS */
window.addBooking=async()=>{

  await supabase.from('bookings').insert([{
    user_id:user.id,
    name:client.value,
    status:status.value
  }]);

  loadBookings();
};

async function loadBookings(){
  const user=(await supabase.auth.getUser()).data.user;

  const {data}=await supabase
    .from('bookings')
    .select('*')
    .eq('user_id', user.id);

  bookList.innerHTML=data.map(b=>`<div>${b.name} - ${b.status}</div>`).join("");
}
</script>
