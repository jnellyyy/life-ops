<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Ops</title>
  <style>
    :root {
      --bg: #0d0d10;
      --card: #17171c;
      --line: #2d2d36;
      --text: #f5f5f7;
      --muted: #a1a1aa;
      --accent: #d41425;
      --accent2: #2a2a32;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: linear-gradient(180deg, #0b0b0d 0%, #121216 100%);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin-top: 18px;
    }

    h1, p {
      margin-top: 0;
    }

    .sub, .notice {
      color: var(--muted);
    }

    .input, .button {
      width: 100%;
      font: inherit;
      border-radius: 12px;
      box-sizing: border-box;
    }

    .input {
      background: #101015;
      color: var(--text);
      border: 1px solid #31313a;
      padding: 13px 14px;
      margin-top: 10px;
    }

    .button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 13px 14px;
      margin-top: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .button.secondary {
      background: var(--accent2);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="authBox" class="card">
      <h1>Life Ops</h1>
      <p class="sub">Sign in once, then use the app.</p>

      <input id="email" class="input" type="email" placeholder="Email" />
      <input id="password" class="input" type="password" placeholder="Password" />

      <button class="button" type="button" onclick="signUp()">Sign Up</button>
      <button class="button secondary" type="button" onclick="signIn()">Sign In</button>

      <p id="msg" class="notice"></p>
    </div>

    <div id="appBox" class="card hidden">
      <h1>Life Ops</h1>
      <p id="sessionText" class="sub">Signed in</p>
      <button class="button secondary" type="button" onclick="logout()">Log out</button>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      "https://grgagroautlpphjsjpjh.supabase.co",
      "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      }
    );

    const authBox = document.getElementById("authBox");
    const appBox = document.getElementById("appBox");
    const msg = document.getElementById("msg");
    const sessionText = document.getElementById("sessionText");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    function setMessage(text) {
      msg.textContent = text;
    }

    async function showAppForSession() {
      const { data } = await supabase.auth.getSession();
      const session = data.session;

      if (session) {
        authBox.classList.add("hidden");
        appBox.classList.remove("hidden");
        sessionText.textContent = session.user?.email || "Signed in";
      } else {
        authBox.classList.remove("hidden");
        appBox.classList.add("hidden");
      }
    }

    window.signUp = async function () {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        setMessage("Enter email and password.");
        return;
      }

      const { error } = await supabase.auth.signUp({ email, password });
      setMessage(error ? error.message : "Signed up. Now sign in.");
    };

    window.signIn = async function () {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        setMessage("Enter email and password.");
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        setMessage(error.message || "Sign in failed.");
        return;
      }

      if (!data.session) {
        setMessage("No session returned.");
        return;
      }

      setMessage("");
      await showAppForSession();
    };

    window.logout = async function () {
      const { error } = await supabase.auth.signOut();
      if (error) {
        setMessage(error.message);
        return;
      }
      await showAppForSession();
      setMessage("Signed out.");
    };

    supabase.auth.onAuthStateChange(async () => {
      await showAppForSession();
    });

    await showAppForSession();
  </script>
</body>
</html>
