<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Pace Weekly Whiteboard</title>

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --line:rgba(255,255,255,0.12);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --accent:#ff3b30;
  --green:#22c55e;
  --shadow:0 20px 50px rgba(0,0,0,0.35);
  --radius:24px;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:18px;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 26%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
}

.wrap{
  max-width:1400px;
  margin:0 auto;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  margin-top:16px;
  backdrop-filter:blur(18px);
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.back-btn{
  padding:10px 14px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  text-decoration:none;
  font-weight:800;
}

.muted{
  color:var(--muted);
}

.controls{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px;
  align-items:end;
}

input, button, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  font:inherit;
}

button{
  background:var(--accent);
  border:none;
  font-weight:800;
  cursor:pointer;
}

button.secondary{
  background:rgba(255,255,255,0.10);
}

.board-wrap{
  overflow:auto;
  margin-top:16px;
  border-radius:22px;
  border:1px solid var(--line);
}

.board{
  min-width:980px;
  display:grid;
  grid-template-columns:82px repeat(7, 1fr);
}

.cell{
  min-height:72px;
  border-right:1px solid rgba(255,255,255,0.08);
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:8px;
  background:rgba(255,255,255,0.035);
}

.header{
  position:sticky;
  top:0;
  z-index:2;
  background:#1b1d23;
  font-weight:900;
  text-align:center;
  min-height:52px;
}

.time{
  position:sticky;
  left:0;
  z-index:1;
  background:#1b1d23;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  display:flex;
  align-items:flex-start;
  justify-content:center;
}

.slot{
  cursor:pointer;
}

.slot:hover{
  background:rgba(255,255,255,0.075);
}

.slot-content{
  min-height:48px;
  border-radius:12px;
  padding:8px;
  background:rgba(255,255,255,0.06);
  font-size:13px;
  line-height:1.35;
  white-space:pre-wrap;
}

.slot-content.done{
  text-decoration:line-through;
  color:var(--muted);
  background:rgba(34,197,94,0.12);
  border:1px solid rgba(34,197,94,0.22);
}

.empty-slot{
  color:rgba(255,255,255,0.22);
  font-size:20px;
  text-align:center;
  padding-top:12px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.72);
  display:none;
  align-items:flex-end;
  z-index:50;
}

.sheet{
  width:100%;
  background:#13151b;
  border-radius:28px 28px 0 0;
  padding:20px;
  border-top:1px solid var(--line);
}

.sheet h3{
  margin:0;
}

.sheet-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.notice{
  min-height:18px;
  color:#bbb;
  margin-top:10px;
}

@media(max-width:800px){
  body{padding:14px;}
  .controls{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <div class="topbar">
      <div>
        <h2 style="margin:0;">Weekly Whiteboard</h2>
        <p class="muted" style="margin:6px 0 0;">Fixed Monday–Sunday planner with 30-minute slots.</p>
      </div>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </div>

    <div class="controls">
      <input id="weekStart" type="date">
      <button id="loadWeekBtn">Load week</button>
      <button id="clearWeekBtn" class="secondary">Clear week</button>
    </div>

    <p id="msg" class="notice"></p>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>

</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="modalTitle">Edit slot</h3>
    <p class="muted" id="modalSub"></p>

    <textarea id="slotText" placeholder="What are you doing?"></textarea>

    <div class="sheet-actions">
      <button id="saveSlotBtn">Save</button>
      <button id="doneSlotBtn" class="secondary">Done / Undo</button>
    </div>

    <button id="deleteSlotBtn" class="secondary">Delete slot</button>
    <button onclick="closeModal()" class="secondary">Close</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      storage:localStorage
    }
  }
);

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const START_HOUR = 8;
const END_HOUR = 23;

const boardEl = document.getElementById("board");
const weekStartEl = document.getElementById("weekStart");
const msgEl = document.getElementById("msg");

const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalSub = document.getElementById("modalSub");
const slotText = document.getElementById("slotText");
const saveSlotBtn = document.getElementById("saveSlotBtn");
const doneSlotBtn = document.getElementById("doneSlotBtn");
const deleteSlotBtn = document.getElementById("deleteSlotBtn");

let user = null;
let slots = [];
let active = null;

function setMsg(text){
  msgEl.textContent = text;
}

function todayMonday(){
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().split("T")[0];
}

function makeTimes(){
  const times = [];
  for(let h = START_HOUR; h <= END_HOUR; h++){
    times.push(`${String(h).padStart(2,"0")}:00`);
    times.push(`${String(h).padStart(2,"0")}:30`);
  }
  return times;
}

function slotFor(day, time){
  return slots.find(s => s.day_name === day && s.slot_time === time);
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function render(){
  const times = makeTimes();

  let html = `
    <div class="cell header time"></div>
    ${DAYS.map(day => `<div class="cell header">${day}</div>`).join("")}
  `;

  times.forEach(time => {
    html += `<div class="cell time">${time}</div>`;

    DAYS.forEach(day => {
      const slot = slotFor(day, time);

      html += `
        <div class="cell slot" onclick="openSlot('${day}', '${time}')">
          ${
            slot?.text
              ? `<div class="slot-content ${slot.done ? "done" : ""}">${slot.text}</div>`
              : `<div class="empty-slot">＋</div>`
          }
        </div>
      `;
    });
  });

  boardEl.innerHTML = html;
}

async function load(){
  user = await getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  if(!weekStartEl.value){
    weekStartEl.value = todayMonday();
  }

  const { data, error } = await supabase
    .from("weekly_slots")
    .select("*")
    .eq("user_id", user.id)
    .eq("week_start", weekStartEl.value);

  if(error){
    setMsg(error.message);
    return;
  }

  slots = data || [];
  render();
}

window.openSlot = function(day, time){
  const existing = slotFor(day, time);

  active = {
    day,
    time,
    id: existing?.id || null,
    done: existing?.done || false
  };

  modalTitle.textContent = `${day} ${time}`;
  modalSub.textContent = weekStartEl.value;
  slotText.value = existing?.text || "";
  doneSlotBtn.textContent = existing?.done ? "Undo" : "Mark done";
  modal.style.display = "flex";
}

window.closeModal = function(){
  modal.style.display = "none";
  active = null;
}

saveSlotBtn.onclick = async function(){
  if(!active) return;

  const text = slotText.value.trim();

  if(active.id){
    const { error } = await supabase
      .from("weekly_slots")
      .update({ text })
      .eq("id", active.id);

    if(error) return setMsg(error.message);
  } else {
    if(!text) return;

    const { error } = await supabase
      .from("weekly_slots")
      .insert([{
        user_id:user.id,
        week_start:weekStartEl.value,
        day_name:active.day,
        slot_time:active.time,
        text,
        done:false
      }]);

    if(error) return setMsg(error.message);
  }

  closeModal();
  await load();
}

doneSlotBtn.onclick = async function(){
  if(!active?.id) return;

  const { error } = await supabase
    .from("weekly_slots")
    .update({ done: !active.done })
    .eq("id", active.id);

  if(error) return setMsg(error.message);

  closeModal();
  await load();
}

deleteSlotBtn.onclick = async function(){
  if(!active?.id){
    closeModal();
    return;
  }

  const { error } = await supabase
    .from("weekly_slots")
    .delete()
    .eq("id", active.id);

  if(error) return setMsg(error.message);

  closeModal();
  await load();
}

document.getElementById("loadWeekBtn").onclick = load;

document.getElementById("clearWeekBtn").onclick = async function(){
  const ok = confirm("Clear this whole week?");
  if(!ok) return;

  const { error } = await supabase
    .from("weekly_slots")
    .delete()
    .eq("user_id", user.id)
    .eq("week_start", weekStartEl.value);

  if(error) return setMsg(error.message);

  await load();
}

load();
</script>

</body>
</html>
