<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance</title>

<style>
:root{
  --bg:#111;
  --card:#1b1b1b;
  --line:#333;
  --text:#fff;
  --muted:#aaa;
  --green:#16a34a;
  --red:#dc2626;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  padding:20px;
  margin:0;
}

.wrap{max-width:1000px;margin:auto;}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:16px;
  margin-top:16px;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.kpi{
  background:#222;
  border-radius:10px;
  padding:10px;
}

.kpi-title{font-size:12px;color:var(--muted);}
.kpi-value{font-size:18px;font-weight:700;margin-top:4px;}

input,select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  background:#0f0f0f;
  border:1px solid var(--line);
  color:#fff;
}

button{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#d41425;
  color:#fff;
  font-weight:700;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.tx{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #2a2a2a;
}

.income{color:var(--green);}
.expense{color:var(--red);}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <h2>Finance</h2>
  <div class="kpis" id="kpis"></div>
</div>

<div class="card">
  <h3>Add transaction</h3>

  <div class="row">
    <select id="type">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>

    <input id="amount" type="number" placeholder="Amount">
  </div>

  <div class="row">
    <input id="category" placeholder="Category (e.g. food, gear, client)">
    <input id="date" type="date">
  </div>

  <input id="note" placeholder="Note">

  <button onclick="addTx()">Save</button>
</div>

<div class="card">
  <h3>Transactions</h3>
  <div id="list"></div>
</div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

const kpis = document.getElementById("kpis");
const list = document.getElementById("list");

async function getUser(){
  const {data}=await supabase.auth.getUser();
  return data.user;
}

window.addTx = async function(){
  const user = await getUser();

  await supabase.from("transactions").insert([{
    user_id:user.id,
    type:type.value,
    amount:Number(amount.value||0),
    category:category.value,
    date:date.value,
    note:note.value
  }]);

  location.reload();
};

function money(v){
  return "£"+Number(v||0).toFixed(0);
}

async function load(){
  const user = await getUser();

  const {data:txs}=await supabase
    .from("transactions")
    .select("*")
    .eq("user_id",user.id)
    .order("date",{ascending:false});

  const {data:payments}=await supabase
    .from("payments")
    .select("*");

  const incomeManual = txs.filter(t=>t.type==="income")
    .reduce((s,t)=>s+t.amount,0);

  const expenses = txs.filter(t=>t.type==="expense")
    .reduce((s,t)=>s+t.amount,0);

  const incomeBookings = payments.reduce((s,p)=>s+p.amount,0);

  const incomeTotal = incomeManual + incomeBookings;
  const balance = incomeTotal - expenses;

  kpis.innerHTML = `
    <div class="kpi">
      <div class="kpi-title">Total in</div>
      <div class="kpi-value">${money(incomeTotal)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-title">Total out</div>
      <div class="kpi-value">${money(expenses)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-title">Balance</div>
      <div class="kpi-value">${money(balance)}</div>
    </div>
  `;

  list.innerHTML = txs.map(t=>`
    <div class="tx">
      <div>
        ${t.category}<br>
        <span style="color:#888;font-size:12px;">${t.note||""}</span>
      </div>
      <div class="${t.type}">
        ${t.type==="income"?"+":"-"}${money(t.amount)}
      </div>
    </div>
  `).join("");
}

load();
</script>

</body>
</html>
