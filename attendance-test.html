<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pace Attendance</title>
  <link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-32.png">
<meta name="theme-color" content="#0f1115">
  <style>
    :root {
      --bg1:#0f1115;
      --bg2:#171a20;
      --panel:rgba(255,255,255,0.06);
      --panel-strong:rgba(255,255,255,0.08);
      --line:rgba(255,255,255,0.10);
      --text:#f5f7fb;
      --muted:#a7afbe;
      --accent:#ff3b30;
      --office:#22c55e;
      --wfh:#60a5fa;
      --sick:#ef4444;
      --holiday:#f59e0b;
      --bank:#a855f7;
      --blocked:#6b7280;
      --shadow:0 20px 50px rgba(0,0,0,0.35);
      --blur:18px;
      --radius:24px;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      padding:18px;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 26%),
        radial-gradient(circle at top right, rgba(255,59,48,0.10), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }

    .glass {
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
    }

    .card {
      padding:20px;
      margin-top:16px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .back-btn {
      width:auto;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.08);
      color:#fff;
      border:none;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
    }

    .muted { color:var(--muted); }

    .kpis {
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:12px;
      margin-top:14px;
    }

    .kpi {
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:12px 14px;
    }

    .kpi-title {
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .kpi-value {
      font-size:18px;
      font-weight:700;
    }

    .status-on { color:var(--office); }
    .status-warn { color:var(--holiday); }
    .status-bad { color:var(--sick); }

    .section-title {
      margin:0 0 8px 0;
      font-size:22px;
      letter-spacing:-0.03em;
    }

    .grid-2 {
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      gap:16px;
      margin-top:16px;
    }

    .rule-form-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .rule-form-grid-3 {
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    input, select, button {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      color:#fff;
      border:1px solid rgba(255,255,255,0.10);
      font:inherit;
    }

    input::placeholder {
      color:#9da6b5;
    }

    button {
      background:var(--accent);
      border:none;
      font-weight:700;
      cursor:pointer;
    }

    .secondary-btn {
      background:rgba(255,255,255,0.10);
    }

    .danger-btn {
      background:rgba(239,68,68,0.18);
    }

    .notice {
      color:#bbb;
      white-space:pre-wrap;
      margin-top:10px;
      min-height:18px;
    }

    .working-days {
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-top:10px;
    }

    .day-check {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:10px 8px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      font-size:13px;
    }

    .day-check input {
      width:auto;
      margin:0;
      padding:0;
    }

    .rule-item {
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:14px;
      margin-top:10px;
    }

    .rule-head {
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }

    .rule-name {
      font-weight:700;
      margin-bottom:4px;
      font-size:15px;
    }

    .rule-meta {
      font-size:13px;
      color:var(--muted);
      line-height:1.5;
    }

    .rule-actions {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .pill-row {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .pill {
      display:inline-block;
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      color:#fff;
    }

    .pill-monthly { background:#6b7280; }
    .pill-rolling { background:#60a5fa; }
    .pill-current { background:#22c55e; }
    .pill-ended { background:#4b5563; }

    .calendar-head {
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:12px;
    }

    .calendar {
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-top:8px;
    }

    .dow {
      text-align:center;
      font-size:12px;
      color:var(--muted);
      padding-bottom:2px;
    }

    .day {
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      min-height:96px;
      padding:10px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .day.office { border-color:rgba(34,197,94,0.65); }
    .day.wfh { border-color:rgba(96,165,250,0.65); }
    .day.sick { border-color:rgba(239,68,68,0.65); }
    .day.holiday { border-color:rgba(245,158,11,0.65); }

    .day.bank-holiday {
      border-color:rgba(168,85,247,0.75);
      box-shadow:inset 0 0 0 1px rgba(168,85,247,0.45);
      cursor:not-allowed;
      background:rgba(168,85,247,0.10);
    }

    .day.blocked {
      border-color:rgba(107,114,128,0.45);
      background:rgba(255,255,255,0.03);
      color:#8a93a2;
      cursor:not-allowed;
      opacity:0.72;
    }

    .day-number {
      font-weight:700;
    }

    .day-status {
      font-size:11px;
      color:var(--muted);
      line-height:1.25;
    }

    .progress-wrap {
      margin-top:16px;
    }

    .progress-label {
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .progress-bar {
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      overflow:hidden;
    }

    .progress-fill {
      height:100%;
      border-radius:999px;
      background:var(--office);
    }

    .summary-lines {
      margin-top:12px;
      color:#d6dbe4;
      line-height:1.55;
    }

    .summary-lines strong {
      color:#fff;
    }

    .legend {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin:14px 0 10px;
      color:var(--muted);
      font-size:13px;
    }

    .legend-item {
      display:flex;
      align-items:center;
      gap:6px;
    }

    .dot {
      width:12px;
      height:12px;
      border-radius:999px;
      display:inline-block;
    }

    @media (max-width:980px) {
      .grid-2,
      .kpis,
      .rule-form-grid,
      .rule-form-grid-3,
      .working-days {
        grid-template-columns:1fr;
      }
    }

    @media (max-width:700px) {
      body {
        padding:14px;
      }

      .calendar {
        gap:6px;
      }

      .day {
        min-height:78px;
      }
    }
  </style>
</head>
<body>

<div class="wrap">

  <div class="glass card">
    <div class="topbar">
      <div>
        <h2 style="margin:0;">Pace Attendance</h2>
        <p class="muted" style="margin:6px 0 0 0;">Flexible rules by date range, with monthly or rolling periods.</p>
      </div>
      <a class="back-btn" href="dashboard.html">← Dashboard</a>
    </div>

    <div id="stats"></div>
  </div>

  <div class="grid-2">
    <div class="glass card">
      <h3 class="section-title">Attendance Rules</h3>
      <p class="muted" style="margin-bottom:0;">Each rule applies over its date range. Later rules override earlier ones.</p>

      <input id="ruleName" placeholder="Rule name e.g. Rolling 2 days" />

      <div class="rule-form-grid">
        <input id="ruleStart" type="date" />
        <input id="ruleEnd" type="date" />
      </div>

      <div class="rule-form-grid">
        <select id="ruleMode">
          <option value="monthly">Monthly</option>
          <option value="rolling_28">Rolling 28 days</option>
        </select>

        <input id="ruleDaysPerWeek" type="number" min="0" step="0.5" placeholder="Days per week" />
      </div>

      <div style="margin-top:10px;font-size:13px;color:var(--muted);">Working days</div>
      <div class="working-days">
        <label class="day-check"><input type="checkbox" value="1" checked> Mon</label>
        <label class="day-check"><input type="checkbox" value="2" checked> Tue</label>
        <label class="day-check"><input type="checkbox" value="3" checked> Wed</label>
        <label class="day-check"><input type="checkbox" value="4" checked> Thu</label>
        <label class="day-check"><input type="checkbox" value="5" checked> Fri</label>
        <label class="day-check"><input type="checkbox" value="6"> Sat</label>
        <label class="day-check"><input type="checkbox" value="0"> Sun</label>
      </div>

      <div class="rule-form-grid">
        <button id="saveRuleBtn" type="button">Save rule</button>
        <button id="clearRuleBtn" class="secondary-btn" type="button">Clear form</button>
      </div>

      <p id="ruleMsg" class="notice"></p>

      <div id="rulesList"></div>
    </div>

    <div class="glass card">
      <div class="calendar-head">
        <h3 class="section-title" id="monthTitle" style="margin:0;"></h3>
        <div>
          <button class="secondary-btn" onclick="changeMonth(-1)">Prev</button>
          <button class="secondary-btn" onclick="goToday()">Today</button>
          <button class="secondary-btn" onclick="changeMonth(1)">Next</button>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><span class="dot" style="background:#22c55e;"></span> Office</div>
        <div class="legend-item"><span class="dot" style="background:#60a5fa;"></span> WFH</div>
        <div class="legend-item"><span class="dot" style="background:#ef4444;"></span> Sick</div>
        <div class="legend-item"><span class="dot" style="background:#f59e0b;"></span> Holiday</div>
        <div class="legend-item"><span class="dot" style="background:#a855f7;"></span> Bank holiday</div>
        <div class="legend-item"><span class="dot" style="background:#6b7280;"></span> Non-working day</div>
      </div>

      <div class="calendar" id="calendar"></div>
      <p class="notice" id="msg"></p>
    </div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const BANK_HOLIDAYS = {
  "2025-01-01": "New Year's Day",
  "2025-04-18": "Good Friday",
  "2025-04-21": "Easter Monday",
  "2025-05-05": "Early May bank holiday",
  "2025-05-26": "Spring bank holiday",
  "2025-08-25": "Summer bank holiday",
  "2025-12-25": "Christmas Day",
  "2025-12-26": "Boxing Day",

  "2026-01-01": "New Year's Day",
  "2026-04-03": "Good Friday",
  "2026-04-06": "Easter Monday",
  "2026-05-04": "Early May bank holiday",
  "2026-05-25": "Spring bank holiday",
  "2026-08-31": "Summer bank holiday",
  "2026-12-25": "Christmas Day",
  "2026-12-28": "Boxing Day (substitute day)",

  "2027-01-01": "New Year's Day",
  "2027-03-26": "Good Friday",
  "2027-03-29": "Easter Monday",
  "2027-05-03": "Early May bank holiday",
  "2027-05-31": "Spring bank holiday",
  "2027-08-30": "Summer bank holiday",
  "2027-12-27": "Christmas Day (substitute day)",
  "2027-12-28": "Boxing Day (substitute day)",

  "2028-01-03": "New Year's Day (substitute day)",
  "2028-04-14": "Good Friday",
  "2028-04-17": "Easter Monday",
  "2028-05-01": "Early May bank holiday",
  "2028-05-29": "Spring bank holiday",
  "2028-08-28": "Summer bank holiday",
  "2028-12-25": "Christmas Day",
  "2028-12-26": "Boxing Day"
};

const DEFAULT_RULE = {
  rule_name: "Default rule",
  start_date: "2025-01-01",
  end_date: null,
  calculation_mode: "monthly",
  days_per_week: 3,
  working_days: [1,2,3,4,5]
};

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");
const msg = document.getElementById("msg");
const ruleMsg = document.getElementById("ruleMsg");
const rulesList = document.getElementById("rulesList");

const ruleNameEl = document.getElementById("ruleName");
const ruleStartEl = document.getElementById("ruleStart");
const ruleEndEl = document.getElementById("ruleEnd");
const ruleModeEl = document.getElementById("ruleMode");
const ruleDaysPerWeekEl = document.getElementById("ruleDaysPerWeek");

let currentDate = new Date();
let attendanceMap = {};
let rules = [];
let editingRuleId = null;

const attendanceOrder = ["blank", "Office", "WFH", "Sick", "Holiday"];

function formatDate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function formatDisplayDate(d) {
  return d.toLocaleDateString("en-GB");
}

function formatMonthLabel(d) {
  return d.toLocaleString("default", {
    month: "long",
    year: "numeric"
  });
}

function parseDateOnly(value) {
  return new Date(value + "T00:00:00");
}

function isBankHoliday(date) {
  return !!BANK_HOLIDAYS[formatDate(date)];
}

function getBankHolidayTitle(date) {
  return BANK_HOLIDAYS[formatDate(date)] || "";
}

function checkedWorkingDays() {
  return [...document.querySelectorAll('.working-days input:checked')].map(el => Number(el.value));
}

function setWorkingDays(values) {
  const chosen = new Set((values || []).map(Number));
  document.querySelectorAll('.working-days input').forEach(el => {
    el.checked = chosen.has(Number(el.value));
  });
}

function clearRuleForm() {
  editingRuleId = null;
  ruleNameEl.value = "";
  ruleStartEl.value = "";
  ruleEndEl.value = "";
  ruleModeEl.value = "monthly";
  ruleDaysPerWeekEl.value = "";
  setWorkingDays([1,2,3,4,5]);
  ruleMsg.textContent = "";
}

async function getUser() {
  const { data } = await supabase.auth.getUser();
  return data.user;
}

async function seedRules(userId) {
  const { data } = await supabase
    .from("attendance_rules")
    .select("id")
    .eq("user_id", userId);

  if ((data || []).length) return;

  await supabase.from("attendance_rules").insert([{
    user_id: userId,
    ...DEFAULT_RULE
  }]);
}

function getRuleForDate(date) {
  const applicable = rules.filter(rule => {
    const start = parseDateOnly(rule.start_date);
    const end = rule.end_date ? parseDateOnly(rule.end_date) : null;
    return start <= date && (!end || date <= end);
  });

  if (!applicable.length) return null;

  applicable.sort((a, b) => parseDateOnly(b.start_date) - parseDateOnly(a.start_date));
  return applicable[0];
}

function getViewedMonthBounds() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  return {
    start: new Date(y, m, 1),
    end: new Date(y, m + 1, 0)
  };
}

function getPeriodForView() {
  const { start: monthStart, end: monthEnd } = getViewedMonthBounds();
  const controllingRule = getRuleForDate(monthEnd) || DEFAULT_RULE;

  if (controllingRule.calculation_mode === "rolling_28") {
    const end = new Date(monthEnd);
    const start = new Date(monthEnd);
    start.setDate(start.getDate() - 27);
    return {
      start,
      end,
      mode: "rolling_28",
      rule: controllingRule,
      label: `${formatDisplayDate(start)} - ${formatDisplayDate(end)}`
    };
  }

  return {
    start: monthStart,
    end: monthEnd,
    mode: "monthly",
    rule: controllingRule,
    label: formatMonthLabel(monthStart)
  };
}

function getWorkingDaysForDate(date) {
  const rule = getRuleForDate(date) || DEFAULT_RULE;
  return Array.isArray(rule.working_days) && rule.working_days.length ? rule.working_days.map(Number) : [1,2,3,4,5];
}

function isWorkingDayForRule(date) {
  const weekday = date.getDay();
  const days = getWorkingDaysForDate(date);
  return days.includes(weekday);
}

function getDailyExpectedContribution(date) {
  const rule = getRuleForDate(date) || DEFAULT_RULE;
  const days = Array.isArray(rule.working_days) && rule.working_days.length ? rule.working_days.map(Number) : [1,2,3,4,5];
  const divisor = days.length || 5;
  return Number(rule.days_per_week || 0) / divisor;
}

function getDayStatus(key) {
  return attendanceMap[key] || "blank";
}

function isEligibleWorkingDay(date) {
  if (isBankHoliday(date)) return false;
  if (!isWorkingDayForRule(date)) return false;

  const status = getDayStatus(formatDate(date));
  if (status === "Sick" || status === "Holiday") return false;

  return true;
}

function countEligibleDays(period) {
  let total = 0;
  const d = new Date(period.start);

  while (d <= period.end) {
    if (isEligibleWorkingDay(d)) total++;
    d.setDate(d.getDate() + 1);
  }

  return total;
}

function countTarget(period) {
  let sum = 0;
  const d = new Date(period.start);

  while (d <= period.end) {
    if (isEligibleWorkingDay(d)) {
      sum += getDailyExpectedContribution(d);
    }
    d.setDate(d.getDate() + 1);
  }

  return Math.ceil(sum);
}

function countActualOffice(period) {
  let total = 0;
  const d = new Date(period.start);

  while (d <= period.end) {
    if (getDayStatus(formatDate(d)) === "Office") {
      total++;
    }
    d.setDate(d.getDate() + 1);
  }

  return total;
}

function getStatus(actual, target) {
  if (actual >= target) return { text: "On track", cls: "status-on" };
  if (actual >= Math.max(target - 1, 0)) return { text: "Off track", cls: "status-warn" };
  return { text: "Not met", cls: "status-bad" };
}

function progressPercent(actual, target) {
  if (!target || target <= 0) return 0;
  return Math.min((actual / target) * 100, 100);
}

function ruleModeLabel(mode) {
  return mode === "rolling_28" ? "Rolling 28 days" : "Monthly";
}

function workingDayNames(days) {
  const map = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return (days || []).map(Number).sort((a,b) => {
    const normalise = x => x === 0 ? 7 : x;
    return normalise(a) - normalise(b);
  }).map(d => map[d]).join(", ");
}

function renderStats() {
  const stats = document.getElementById("stats");
  const period = getPeriodForView();
  const actual = countActualOffice(period);
  const eligibleDays = countEligibleDays(period);
  const target = countTarget(period);
  const status = getStatus(actual, target);
  const progress = progressPercent(actual, target);
  const rule = period.rule || DEFAULT_RULE;
  const ratio = (Number(rule.days_per_week || 0) / ((rule.working_days || [1,2,3,4,5]).length || 5)) * 100;

  stats.innerHTML = `
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-title">Period Used</div>
        <div class="kpi-value">${period.label}</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Actual Days Attended</div>
        <div class="kpi-value">${actual}</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Eligible Days</div>
        <div class="kpi-value">${eligibleDays}</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">Target</div>
        <div class="kpi-value">${target}</div>
      </div>

      <div class="kpi">
        <div class="kpi-title">${ruleModeLabel(period.mode)}</div>
        <div class="kpi-value ${status.cls}">${status.text}</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress to target</span>
        <span>${actual} / ${target} office days</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="summary-lines">
      <div><strong>Rule:</strong> ${rule.rule_name || "Unnamed rule"}</div>
      <div><strong>Mode:</strong> ${ruleModeLabel(period.mode)}</div>
      <div><strong>Days per week:</strong> ${Number(rule.days_per_week || 0)}</div>
      <div><strong>Working days:</strong> ${workingDayNames(rule.working_days || [1,2,3,4,5])}</div>
      <div><strong>Equivalent percentage:</strong> ${ratio.toFixed(0)}%</div>
      <div><strong>Actual:</strong> ${actual} office days out of ${eligibleDays} eligible days</div>
    </div>
  `;
}

function renderRules() {
  if (!rules.length) {
    rulesList.innerHTML = `<div class="notice">No rules yet.</div>`;
    return;
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  rulesList.innerHTML = rules.map(rule => {
    const start = parseDateOnly(rule.start_date);
    const end = rule.end_date ? parseDateOnly(rule.end_date) : null;
    const current = start <= today && (!end || today <= end);
    const ended = end && end < today;

    return `
      <div class="rule-item">
        <div class="rule-head">
          <div>
            <div class="rule-name">${rule.rule_name || "Unnamed rule"}</div>
            <div class="rule-meta">
              ${formatDisplayDate(start)}
              ${end ? ` to ${formatDisplayDate(end)}` : ` onward`}<br>
              ${ruleModeLabel(rule.calculation_mode)} • ${Number(rule.days_per_week)} days/week<br>
              Working days: ${workingDayNames(rule.working_days)}
            </div>

            <div class="pill-row">
              <span class="pill ${rule.calculation_mode === "rolling_28" ? "pill-rolling" : "pill-monthly"}">${ruleModeLabel(rule.calculation_mode)}</span>
              ${current ? `<span class="pill pill-current">Current</span>` : ``}
              ${ended ? `<span class="pill pill-ended">Ended</span>` : ``}
            </div>
          </div>
        </div>

        <div class="rule-actions">
          <button class="secondary-btn" onclick="editRule('${rule.id}')">Edit</button>
          <button class="danger-btn" onclick="deleteRule('${rule.id}')">Delete</button>
        </div>
      </div>
    `;
  }).join("");
}

function renderCalendar() {
  calendar.innerHTML = "";

  const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  days.forEach(d => {
    const el = document.createElement("div");
    el.className = "dow";
    el.textContent = d;
    calendar.appendChild(el);
  });

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();

  monthTitle.textContent = currentDate.toLocaleString("default", {
    month: "long",
    year: "numeric"
  });

  const first = new Date(y, m, 1);
  let offset = first.getDay();
  offset = offset === 0 ? 6 : offset - 1;

  for (let i = 0; i < offset; i++) {
    const blank = document.createElement("div");
    calendar.appendChild(blank);
  }

  const last = new Date(y, m + 1, 0).getDate();

  for (let d = 1; d <= last; d++) {
    const date = new Date(y, m, d);
    const key = formatDate(date);
    const status = attendanceMap[key] || "blank";
    const bankHolidayTitle = getBankHolidayTitle(date);
    const bankHoliday = !!bankHolidayTitle;
    const workingDay = isWorkingDayForRule(date);

    const cell = document.createElement("div");

    if (bankHoliday) {
      cell.className = "day bank-holiday";
    } else if (!workingDay) {
      cell.className = "day blocked";
    } else {
      cell.className = "day " + status.toLowerCase();
      cell.onclick = () => cycle(key, status);
    }

    let label = "";
    if (bankHoliday) label = bankHolidayTitle;
    else if (!workingDay) label = "Non-working";
    else if (status !== "blank") label = status;

    cell.innerHTML = `
      <div class="day-number">${d}</div>
      <div class="day-status">${label}</div>
    `;

    calendar.appendChild(cell);
  }

  renderStats();
}

async function loadAttendance(userId) {
  const { data, error } = await supabase
    .from("attendance")
    .select("*")
    .eq("user_id", userId);

  if (error) {
    msg.textContent = error.message;
    return;
  }

  attendanceMap = {};
  (data || []).forEach(r => {
    attendanceMap[r.entry_date] = r.status;
  });
}

async function loadRules(userId) {
  const { data, error } = await supabase
    .from("attendance_rules")
    .select("*")
    .eq("user_id", userId)
    .order("start_date", { ascending: true });

  if (error) {
    ruleMsg.textContent = error.message;
    return;
  }

  rules = data || [];
}

window.editRule = function(id) {
  const rule = rules.find(r => r.id === id);
  if (!rule) return;

  editingRuleId = id;
  ruleNameEl.value = rule.rule_name || "";
  ruleStartEl.value = rule.start_date || "";
  ruleEndEl.value = rule.end_date || "";
  ruleModeEl.value = rule.calculation_mode || "monthly";
  ruleDaysPerWeekEl.value = Number(rule.days_per_week || 0);
  setWorkingDays(rule.working_days || [1,2,3,4,5]);
  ruleMsg.textContent = "Editing rule.";
  window.scrollTo({ top: 0, behavior: "smooth" });
};

window.deleteRule = async function(id) {
  const { error } = await supabase
    .from("attendance_rules")
    .delete()
    .eq("id", id);

  if (error) {
    ruleMsg.textContent = error.message;
    return;
  }

  ruleMsg.textContent = "Rule deleted.";
  await initialise();
};

async function saveRule() {
  const user = await getUser();
  if (!user) return;

  const workingDays = checkedWorkingDays();
  const daysPerWeek = Number(ruleDaysPerWeekEl.value || 0);

  if (!ruleStartEl.value) {
    ruleMsg.textContent = "Choose a start date.";
    return;
  }

  if (!workingDays.length) {
    ruleMsg.textContent = "Choose at least one working day.";
    return;
  }

  if (!daysPerWeek) {
    ruleMsg.textContent = "Enter days per week.";
    return;
  }

  if (daysPerWeek > workingDays.length) {
    ruleMsg.textContent = "Days per week cannot be more than selected working days.";
    return;
  }

  const payload = {
    user_id: user.id,
    rule_name: ruleNameEl.value.trim() || null,
    start_date: ruleStartEl.value,
    end_date: ruleEndEl.value || null,
    calculation_mode: ruleModeEl.value,
    days_per_week: daysPerWeek,
    working_days: workingDays
  };

  let error;

  if (editingRuleId) {
    ({ error } = await supabase
      .from("attendance_rules")
      .update(payload)
      .eq("id", editingRuleId));
  } else {
    ({ error } = await supabase
      .from("attendance_rules")
      .insert([payload]));
  }

  if (error) {
    ruleMsg.textContent = error.message;
    return;
  }

  ruleMsg.textContent = editingRuleId ? "Rule updated." : "Rule saved.";
  clearRuleForm();
  await initialise();
}

document.getElementById("saveRuleBtn").addEventListener("click", saveRule);
document.getElementById("clearRuleBtn").addEventListener("click", clearRuleForm);

async function cycle(date, status) {
  const user = await getUser();
  if (!user) return;

  const next = attendanceOrder[(attendanceOrder.indexOf(status) + 1) % attendanceOrder.length];

  if (next === "blank") {
    const { error } = await supabase
      .from("attendance")
      .delete()
      .eq("user_id", user.id)
      .eq("entry_date", date);

    if (error) {
      msg.textContent = error.message;
      return;
    }

    delete attendanceMap[date];
  } else {
    if (attendanceMap[date]) {
      const { error } = await supabase
        .from("attendance")
        .update({ status: next })
        .eq("user_id", user.id)
        .eq("entry_date", date);

      if (error) {
        msg.textContent = error.message;
        return;
      }
    } else {
      const { error } = await supabase
        .from("attendance")
        .insert([{
          entry_date: date,
          status: next,
          user_id: user.id
        }]);

      if (error) {
        msg.textContent = error.message;
        return;
      }
    }

    attendanceMap[date] = next;
  }

  msg.textContent = `Saved: ${date}`;
  renderCalendar();
}

window.changeMonth = function(n) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + n, 1);
  renderCalendar();
};

window.goToday = function() {
  currentDate = new Date();
  renderCalendar();
};

async function initialise() {
  const user = await getUser();

  if (!user) {
    msg.textContent = "Not logged in";
    return;
  }

  await seedRules(user.id);
  await loadRules(user.id);
  await loadAttendance(user.id);

  renderRules();
  renderCalendar();
}

initialise();
</script>

</body>
</html>
