<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance</title>
<style>
:root {
  --bg:#111;
  --card:#1b1b1b;
  --line:#333;
  --text:#fff;
  --muted:#aaa;
  --office:#16a34a;
  --wfh:#2563eb;
  --sick:#dc2626;
  --holiday:#ca8a04;
}

* { box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  padding: 24px;
  margin: 0;
}

.wrap {
  max-width: 980px;
  margin: 0 auto;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 20px;
  margin-top: 16px;
}

.stats-box {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.stat {
  background: #222;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 10px 14px;
  min-width: 150px;
}

.stat-title {
  font-size: 12px;
  color: #aaa;
}

.stat-value {
  font-size: 18px;
  font-weight: 700;
}

.status-on { color: #16a34a; }
.status-off { color: #ca8a04; }
.status-bad { color: #dc2626; }

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

button {
  background: #d41425;
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
}

button.secondary {
  background: #333;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}

.dow {
  text-align: center;
  font-size: 12px;
  color: #aaa;
}

.day {
  background: #222;
  border: 1px solid #333;
  border-radius: 10px;
  min-height: 80px;
  padding: 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.day.office { border-color: var(--office); }
.day.wfh { border-color: var(--wfh); }
.day.sick { border-color: var(--sick); }
.day.holiday { border-color: var(--holiday); }

.day-number { font-weight: 700; }
.day-status { font-size: 11px; color: #aaa; }

.notice {
  color: #aaa;
  margin-top: 10px;
}

.progress-wrap {
  margin-top: 14px;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  font-size: 13px;
  color: #aaa;
  margin-bottom: 6px;
}

.progress-bar {
  height: 12px;
  border-radius: 999px;
  background: #2a2a2a;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 999px;
  background: #16a34a;
}

.summary-lines {
  margin-top: 12px;
  color: #ddd;
  line-height: 1.5;
}

.summary-lines strong {
  color: #fff;
}

@media (max-width: 700px) {
  .calendar {
    gap: 6px;
  }

  .day {
    min-height: 72px;
  }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="card">
    <div id="stats"></div>
  </div>

  <div class="card">
    <div class="topbar">
      <h2 id="monthTitle"></h2>
      <div>
        <button class="secondary" onclick="changeMonth(-1)">Prev</button>
        <button class="secondary" onclick="goToday()">Today</button>
        <button class="secondary" onclick="changeMonth(1)">Next</button>
      </div>
    </div>

    <div class="calendar" id="calendar"></div>
    <p class="notice" id="msg"></p>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true
    }
  }
);

const calendar = document.getElementById("calendar");
const monthTitle = document.getElementById("monthTitle");
const msg = document.getElementById("msg");

let currentDate = new Date();
let attendanceMap = {};

const order = ["blank", "Office", "WFH", "Sick", "Holiday"];

function formatDate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function formatDisplayDate(d) {
  return d.toLocaleDateString("en-GB");
}

function formatMonthLabel(d) {
  return d.toLocaleString("default", {
    month: "long",
    year: "numeric"
  });
}

async function getUser() {
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function getViewedMonthBounds() {
  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();
  return {
    start: new Date(y, m, 1),
    end: new Date(y, m + 1, 0)
  };
}

function isWeekend(date) {
  const day = date.getDay();
  return day === 0 || day === 6;
}

function countBaseWorkingDays(start, end) {
  let count = 0;
  const d = new Date(start);

  while (d <= end) {
    if (!isWeekend(d)) count++;
    d.setDate(d.getDate() + 1);
  }

  return count;
}

function countExcludedWeekdays(start, end) {
  let count = 0;

  for (const key in attendanceMap) {
    const date = new Date(key + "T00:00:00");
    const status = attendanceMap[key];

    if (date >= start && date <= end && !isWeekend(date) && (status === "Sick" || status === "Holiday")) {
      count++;
    }
  }

  return count;
}

function countEligibleDays(start, end) {
  const baseWorkingDays = countBaseWorkingDays(start, end);
  const excludedDays = countExcludedWeekdays(start, end);
  return Math.max(baseWorkingDays - excludedDays, 0);
}

function getViewedPeriod() {
  const { start, end } = getViewedMonthBounds();
  const policyChange = new Date("2026-03-01");

  if (start < policyChange) {
    const eligibleDays = countEligibleDays(start, end);
    const target = Math.ceil((eligibleDays / 5) * 3);

    return {
      type: "month",
      start,
      end,
      eligibleDays,
      target,
      label: formatMonthLabel(start)
    };
  }

  return {
    type: "rolling",
    start,
    end,
    eligibleDays: countEligibleDays(start, end),
    target: 12,
    label: `${formatDisplayDate(start)} - ${formatDisplayDate(end)}`
  };
}

function countOfficeInViewedPeriod() {
  let count = 0;
  const { start, end } = getViewedPeriod();

  for (const key in attendanceMap) {
    const date = new Date(key + "T00:00:00");
    if (date >= start && date <= end && attendanceMap[key] === "Office") {
      count++;
    }
  }

  return count;
}

function getStatus(count, target) {
  if (count >= target) return { t: "On track", c: "status-on" };
  if (count >= Math.max(target - 1, 0)) return { t: "Off track", c: "status-off" };
  return { t: "Not met", c: "status-bad" };
}

function progressPercent(actual, target) {
  if (!target || target <= 0) return 0;
  return Math.min((actual / target) * 100, 100);
}

function renderStats() {
  const stats = document.getElementById("stats");
  const { label, target, type, eligibleDays } = getViewedPeriod();
  const actual = countOfficeInViewedPeriod();
  const status = getStatus(actual, target);
  const progress = progressPercent(actual, target);

  const title = type === "month" ? "Month Status" : "28 Day Status";

  stats.innerHTML = `
    <div class="stats-box">
      <div class="stat">
        <div class="stat-title">Period Used</div>
        <div class="stat-value">${label}</div>
      </div>

      <div class="stat">
        <div class="stat-title">Actual Days Attended</div>
        <div class="stat-value">${actual}</div>
      </div>

      <div class="stat">
        <div class="stat-title">Target</div>
        <div class="stat-value">${target}</div>
      </div>

      <div class="stat">
        <div class="stat-title">${title}</div>
        <div class="stat-value ${status.c}">${status.t}</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress to target</span>
        <span>${actual} / ${target} office days</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>

    <div class="summary-lines">
      <div><strong>Target:</strong> ${target} office days</div>
      <div><strong>Actual:</strong> ${actual} office days out of ${eligibleDays} eligible days</div>
      <div><strong>Period used:</strong> ${type === "month" ? `${label} monthly` : label}</div>
    </div>
  `;
}

function renderCalendar() {
  calendar.innerHTML = "";

  const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  days.forEach(d => {
    const el = document.createElement("div");
    el.className = "dow";
    el.textContent = d;
    calendar.appendChild(el);
  });

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();

  monthTitle.textContent = currentDate.toLocaleString("default", {
    month: "long",
    year: "numeric"
  });

  const first = new Date(y, m, 1);
  let offset = first.getDay();
  offset = offset === 0 ? 6 : offset - 1;

  for (let i = 0; i < offset; i++) {
    const blank = document.createElement("div");
    calendar.appendChild(blank);
  }

  const last = new Date(y, m + 1, 0).getDate();

  for (let d = 1; d <= last; d++) {
    const date = new Date(y, m, d);
    const key = formatDate(date);
    const status = attendanceMap[key] || "blank";

    const cell = document.createElement("div");
    cell.className = "day " + status.toLowerCase();
    cell.onclick = () => cycle(key, status);

    cell.innerHTML = `
      <div class="day-number">${d}</div>
      <div class="day-status">${status === "blank" ? "" : status}</div>
    `;

    calendar.appendChild(cell);
  }

  renderStats();
}

async function load() {
  const user = await getUser();

  if (!user) {
    msg.textContent = "Not logged in";
    return;
  }

  const { data, error } = await supabase
    .from("attendance")
    .select("*")
    .eq("user_id", user.id);

  if (error) {
    msg.textContent = error.message;
    return;
  }

  attendanceMap = {};
  (data || []).forEach(r => {
    attendanceMap[r.entry_date] = r.status;
  });

  renderCalendar();
}

async function cycle(date, status) {
  const user = await getUser();
  if (!user) return;

  const next = order[(order.indexOf(status) + 1) % order.length];

  if (next === "blank") {
    const { error } = await supabase
      .from("attendance")
      .delete()
      .eq("user_id", user.id)
      .eq("entry_date", date);

    if (error) {
      msg.textContent = error.message;
      return;
    }

    delete attendanceMap[date];
  } else {
    if (attendanceMap[date]) {
      const { error } = await supabase
        .from("attendance")
        .update({ status: next })
        .eq("user_id", user.id)
        .eq("entry_date", date);

      if (error) {
        msg.textContent = error.message;
        return;
      }
    } else {
      const { error } = await supabase
        .from("attendance")
        .insert([{
          entry_date: date,
          status: next,
          user_id: user.id
        }]);

      if (error) {
        msg.textContent = error.message;
        return;
      }
    }

    attendanceMap[date] = next;
  }

  msg.textContent = `Saved: ${date}`;
  renderCalendar();
}

window.changeMonth = function(n) {
  currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + n, 1);
  renderCalendar();
};

window.goToday = function() {
  currentDate = new Date();
  renderCalendar();
};

load();
</script>

</body>
</html>
