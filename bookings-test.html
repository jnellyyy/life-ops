<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pace Bookings</title>

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --line:rgba(255,255,255,0.12);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --accent:#ff3b30;
  --green:#22c55e;
  --amber:#f59e0b;
  --blue:#60a5fa;
  --red:#ef4444;
  --shadow:0 20px 50px rgba(0,0,0,0.35);
  --radius:24px;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:18px;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 26%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
}

.wrap{max-width:1150px;margin:0 auto;}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  margin-top:16px;
  backdrop-filter:blur(18px);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
}

.back-btn{
  padding:10px 14px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  text-decoration:none;
  font-weight:800;
}

.muted{color:var(--muted)}

input,select,textarea,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  font:inherit;
}

input::placeholder,textarea::placeholder{color:#9da6b5}

textarea{
  min-height:76px;
  resize:vertical;
}

button{
  background:var(--accent);
  border:none;
  font-weight:800;
  cursor:pointer;
}

.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:14px;
}

.tab{
  width:auto;
  margin:0;
  padding:8px 11px;
  background:rgba(255,255,255,0.08);
  font-size:13px;
}

.tab.active{background:var(--accent)}

.kpis{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-top:14px;
}

.kpi{
  background:var(--panel2);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:14px;
}

.kpi-title{
  font-size:12px;
  color:var(--muted);
}

.kpi-value{
  font-size:20px;
  font-weight:800;
  margin-top:4px;
}

.booking{
  background:var(--panel2);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  padding:16px;
  margin-top:12px;
}

.booking-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.name{
  font-weight:800;
  font-size:17px;
}

.meta{
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
  margin-top:4px;
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}

.Enquiry{background:#6b7280}
.Pending{background:var(--amber)}
.Booked{background:var(--green)}
.Completed{background:#0f766e}
.Cancelled{background:var(--red)}
.Lost{background:#4b5563}
.Postponed{background:var(--blue)}

.money-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:12px;
}

.money-box{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:15px;
  padding:10px;
}

.money-label{
  font-size:11px;
  color:var(--muted);
}

.money-value{
  font-weight:800;
  margin-top:4px;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
}

.small-btn{
  width:auto;
  margin:0;
  padding:8px 10px;
  border-radius:12px;
  background:rgba(255,255,255,0.10);
  font-size:13px;
}

.danger{background:rgba(239,68,68,0.18)}
.save{background:rgba(34,197,94,0.22)}

.edit-box,.payment-box{
  margin-top:12px;
  padding-top:12px;
  border-top:1px dashed rgba(255,255,255,0.12);
}

.payment-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:13px;
}

.empty{
  color:var(--muted);
  padding:14px 0;
}

.notice{
  color:#bbb;
  min-height:18px;
  margin-top:10px;
}

@media(max-width:800px){
  .row,.row-3,.kpis,.money-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <div class="topbar">
      <div>
        <h2 style="margin:0;">Bookings</h2>
        <p class="muted" style="margin:6px 0 0;">Manage enquiries, bookings, payments and postponed jobs.</p>
      </div>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </div>

    <div class="kpis" id="kpis"></div>

    <div class="tabs" id="tabs"></div>
  </div>

  <div class="card">
    <h3 style="margin:0 0 6px;">Add booking</h3>

    <div class="row">
      <input id="clientName" placeholder="Client / couple name">
      <input id="jobName" placeholder="Job name e.g. Wedding">
    </div>

    <div class="row-3">
      <input id="eventDate" type="date">
      <input id="price" type="number" placeholder="Total price">
      <input id="dueDate" type="date">
    </div>

    <div class="row">
      <select id="status">
        <option>Enquiry</option>
        <option>Pending deposit</option>
        <option>Booked</option>
        <option>Postponed</option>
        <option>Completed</option>
        <option>Cancelled</option>
        <option>Lost lead</option>
      </select>
      <input id="newEventDate" type="date" placeholder="New date if postponed">
    </div>

    <textarea id="note" placeholder="Notes"></textarea>
    <button id="saveBookingBtn">Save booking</button>
    <p id="msg" class="notice"></p>
  </div>

  <div class="card">
    <div id="bookings"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      storage:localStorage
    }
  }
);

const statuses = [
  "All",
  "Enquiry",
  "Pending deposit",
  "Booked",
  "Postponed",
  "Completed",
  "Cancelled",
  "Lost lead"
];

let user = null;
let bookings = [];
let payments = [];
let activeTab = "All";

const tabsEl = document.getElementById("tabs");
const bookingsEl = document.getElementById("bookings");
const kpisEl = document.getElementById("kpis");
const msgEl = document.getElementById("msg");

const clientNameEl = document.getElementById("clientName");
const jobNameEl = document.getElementById("jobName");
const eventDateEl = document.getElementById("eventDate");
const priceEl = document.getElementById("price");
const dueDateEl = document.getElementById("dueDate");
const statusEl = document.getElementById("status");
const newEventDateEl = document.getElementById("newEventDate");
const noteEl = document.getElementById("note");

function setMsg(text){ msgEl.textContent = text; }

function money(v){
  return `£${Number(v || 0).toFixed(2)}`;
}

function formatDate(v){
  if(!v) return "No date set";
  return new Date(v + "T00:00:00").toLocaleDateString("en-GB");
}

function safe(v){
  return String(v || "").replace(/"/g, '&quot;');
}

function paymentsFor(id){
  return payments.filter(p => p.booking_id === id);
}

function paidTotal(id){
  return paymentsFor(id).reduce((sum,p) => sum + Number(p.amount || 0), 0);
}

function statusClass(status){
  if(status === "Pending deposit") return "Pending";
  if(status === "Lost lead") return "Lost";
  return status;
}

function displayDate(booking){
  if(booking.status === "Postponed"){
    return booking.new_event_date
      ? `New date: ${formatDate(booking.new_event_date)}`
      : "Pending new date";
  }

  return `Event: ${formatDate(booking.event_date)}`;
}

function renderTabs(){
  tabsEl.innerHTML = statuses.map(s => `
    <button class="tab ${activeTab === s ? "active" : ""}" onclick="setTab('${s}')">
      ${s}
    </button>
  `).join("");
}

window.setTab = function(tab){
  activeTab = tab;
  render();
}

function renderKpis(){
  const totalValue = bookings.reduce((sum,b) => sum + Number(b.price || 0), 0);
  const totalPaid = payments.reduce((sum,p) => sum + Number(p.amount || 0), 0);
  const outstanding = totalValue - totalPaid;

  kpisEl.innerHTML = `
    <div class="kpi">
      <div class="kpi-title">Total jobs</div>
      <div class="kpi-value">${bookings.length}</div>
    </div>
    <div class="kpi">
      <div class="kpi-title">Booked</div>
      <div class="kpi-value">${bookings.filter(b => b.status === "Booked").length}</div>
    </div>
    <div class="kpi">
      <div class="kpi-title">Postponed</div>
      <div class="kpi-value">${bookings.filter(b => b.status === "Postponed").length}</div>
    </div>
    <div class="kpi">
      <div class="kpi-title">Paid</div>
      <div class="kpi-value">${money(totalPaid)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-title">Outstanding</div>
      <div class="kpi-value">${money(outstanding)}</div>
    </div>
  `;
}

function render(){
  renderTabs();
  renderKpis();

  let rows = [...bookings];

  if(activeTab !== "All"){
    rows = rows.filter(b => b.status === activeTab);
  }

  rows.sort((a,b) => {
    if(a.status === "Postponed" && b.status !== "Postponed") return 1;
    if(a.status !== "Postponed" && b.status === "Postponed") return -1;

    const dateA = a.status === "Postponed" ? a.new_event_date : a.event_date;
    const dateB = b.status === "Postponed" ? b.new_event_date : b.event_date;

    return new Date(dateA || "2999-01-01") - new Date(dateB || "2999-01-01");
  });

  if(!rows.length){
    bookingsEl.innerHTML = `<div class="empty">No bookings here yet.</div>`;
    return;
  }

  bookingsEl.innerHTML = rows.map(b => {
    const paid = paidTotal(b.id);
    const remaining = Math.max(Number(b.price || 0) - paid, 0);
    const bPayments = paymentsFor(b.id);

    return `
      <div class="booking">
        <div class="booking-head">
          <div>
            <div class="name">${b.client_name || ""} — ${b.job_name || "Booking"}</div>
            <div class="meta">
              ${displayDate(b)}<br>
              Original date: ${formatDate(b.event_date)}<br>
              Due: ${formatDate(b.due_date)}
            </div>
            <span class="badge ${statusClass(b.status)}">${b.status === "Postponed" && !b.new_event_date ? "Pending new date" : b.status}</span>
          </div>

          <button class="small-btn danger" onclick="deleteBooking('${b.id}')">Delete</button>
        </div>

        <div class="money-grid">
          <div class="money-box">
            <div class="money-label">Total</div>
            <div class="money-value">${money(b.price)}</div>
          </div>
          <div class="money-box">
            <div class="money-label">Paid</div>
            <div class="money-value">${money(paid)}</div>
          </div>
          <div class="money-box">
            <div class="money-label">Remaining</div>
            <div class="money-value">${money(remaining)}</div>
          </div>
        </div>

        ${b.note ? `<div class="meta" style="margin-top:10px;">${b.note}</div>` : ""}

        <div class="actions">
          <button class="small-btn" onclick="toggleEdit('${b.id}')">Edit</button>

          <select style="width:auto;margin:0;" id="move-${b.id}">
            ${statuses.filter(s => s !== "All").map(s => `
              <option ${b.status === s ? "selected" : ""}>${s}</option>
            `).join("")}
          </select>

          <button class="small-btn save" onclick="moveBooking('${b.id}')">Move</button>
        </div>

        <div id="edit-${b.id}" class="edit-box" style="display:none;">
          <div class="row">
            <input id="edit-client-${b.id}" value="${safe(b.client_name)}" placeholder="Client">
            <input id="edit-job-${b.id}" value="${safe(b.job_name)}" placeholder="Job">
          </div>

          <div class="row-3">
            <input id="edit-event-${b.id}" type="date" value="${b.event_date || ""}">
            <input id="edit-new-event-${b.id}" type="date" value="${b.new_event_date || ""}">
            <input id="edit-price-${b.id}" type="number" value="${Number(b.price || 0)}">
          </div>

          <div class="row">
            <input id="edit-due-${b.id}" type="date" value="${b.due_date || ""}">
            <select id="edit-status-${b.id}">
              ${statuses.filter(s => s !== "All").map(s => `
                <option ${b.status === s ? "selected" : ""}>${s}</option>
              `).join("")}
            </select>
          </div>

          <textarea id="edit-note-${b.id}">${b.note || ""}</textarea>
          <button class="small-btn save" onclick="saveEdit('${b.id}')">Save changes</button>
        </div>

        <div class="payment-box">
          <strong>Payments</strong>

          ${
            bPayments.length
              ? bPayments.map(p => `
                <div class="payment-row">
                  <div>${p.payment_type || "Payment"} • ${formatDate(p.payment_date)} • ${p.note || ""}</div>
                  <div>
                    ${money(p.amount)}
                    <button class="small-btn danger" onclick="deletePayment('${p.id}')">Delete</button>
                  </div>
                </div>
              `).join("")
              : `<div class="empty">No payments yet.</div>`
          }

          <div class="row-3">
            <input id="pay-amount-${b.id}" type="number" placeholder="Amount">
            <select id="pay-type-${b.id}">
              <option>Deposit</option>
              <option>Instalment</option>
              <option>Final balance</option>
              <option>Additional payment</option>
            </select>
            <input id="pay-date-${b.id}" type="date">
          </div>

          <input id="pay-note-${b.id}" placeholder="Payment note">
          <button class="small-btn" onclick="addPayment('${b.id}')">Add payment</button>
        </div>
      </div>
    `;
  }).join("");
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

async function load(){
  user = await getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  const [bookingsRes, paymentsRes] = await Promise.all([
    supabase
      .from("bookings")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending:false }),

    supabase
      .from("payments")
      .select("*")
      .eq("user_id", user.id)
      .order("payment_date", { ascending:false })
  ]);

  if(bookingsRes.error){
    setMsg(bookingsRes.error.message);
    return;
  }

  if(paymentsRes.error){
    setMsg(paymentsRes.error.message);
    return;
  }

  bookings = bookingsRes.data || [];
  payments = paymentsRes.data || [];

  render();
}

document.getElementById("saveBookingBtn").onclick = async () => {
  const clientName = clientNameEl.value.trim();
  const jobName = jobNameEl.value.trim();

  if(!clientName){
    setMsg("Enter client name.");
    return;
  }

  const { error } = await supabase.from("bookings").insert([{
    user_id:user.id,
    client_name:clientName,
    job_name:jobName || "Booking",
    event_date:eventDateEl.value || null,
    new_event_date:newEventDateEl.value || null,
    price:Number(priceEl.value || 0),
    due_date:dueDateEl.value || null,
    status:statusEl.value,
    note:noteEl.value.trim() || null
  }]);

  if(error){
    setMsg(error.message);
    return;
  }

  clientNameEl.value = "";
  jobNameEl.value = "";
  eventDateEl.value = "";
  newEventDateEl.value = "";
  priceEl.value = "";
  dueDateEl.value = "";
  statusEl.value = "Enquiry";
  noteEl.value = "";

  setMsg("Booking saved.");
  await load();
};

window.toggleEdit = function(id){
  const box = document.getElementById(`edit-${id}`);
  box.style.display = box.style.display === "none" ? "block" : "none";
}

window.saveEdit = async function(id){
  const status = document.getElementById(`edit-status-${id}`).value;

  const { error } = await supabase
    .from("bookings")
    .update({
      client_name:document.getElementById(`edit-client-${id}`).value.trim(),
      job_name:document.getElementById(`edit-job-${id}`).value.trim(),
      event_date:document.getElementById(`edit-event-${id}`).value || null,
      new_event_date:document.getElementById(`edit-new-event-${id}`).value || null,
      price:Number(document.getElementById(`edit-price-${id}`).value || 0),
      due_date:document.getElementById(`edit-due-${id}`).value || null,
      status,
      note:document.getElementById(`edit-note-${id}`).value.trim() || null
    })
    .eq("id", id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Booking updated.");
  await load();
}

window.moveBooking = async function(id){
  const status = document.getElementById(`move-${id}`).value;

  const { error } = await supabase
    .from("bookings")
    .update({ status })
    .eq("id", id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Booking moved.");
  await load();
}

window.deleteBooking = async function(id){
  const ok = confirm("Delete this booking?");
  if(!ok) return;

  const { error } = await supabase
    .from("bookings")
    .delete()
    .eq("id", id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Booking deleted.");
  await load();
}

window.addPayment = async function(id){
  const amount = Number(document.getElementById(`pay-amount-${id}`).value || 0);

  if(!amount){
    setMsg("Enter payment amount.");
    return;
  }

  const { error } = await supabase.from("payments").insert([{
    user_id:user.id,
    booking_id:id,
    amount,
    payment_type:document.getElementById(`pay-type-${id}`).value,
    payment_date:document.getElementById(`pay-date-${id}`).value || null,
    note:document.getElementById(`pay-note-${id}`).value.trim() || null
  }]);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Payment added.");
  await load();
}

window.deletePayment = async function(id){
  const { error } = await supabase
    .from("payments")
    .delete()
    .eq("id", id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Payment deleted.");
  await load();
}

load();
</script>
</body>
</html>
