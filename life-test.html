<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pace To Do</title>

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">
<meta name="theme-color" content="#0f1115">

<style>
:root{
  --bg1:#0f1115;
  --bg2:#171a20;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --line:rgba(255,255,255,0.12);
  --text:#f5f7fb;
  --muted:#a7afbe;
  --accent:#ff3b30;
  --green:#22c55e;
  --shadow:0 20px 50px rgba(0,0,0,0.35);
  --radius:24px;
}

*{box-sizing:border-box}

body{
  margin:0;
  padding:18px;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 26%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
}

.wrap{max-width:980px;margin:0 auto;}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
  margin-top:16px;
  backdrop-filter:blur(18px);
}

.topbar{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
}

.back-btn{
  padding:10px 14px;
  border-radius:14px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  text-decoration:none;
  font-weight:800;
}

.muted{color:var(--muted)}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;
  font:inherit;
}

input::placeholder{color:#9da6b5}

button{
  background:var(--accent);
  border:none;
  font-weight:800;
  cursor:pointer;
}

.row{
  display:grid;
  grid-template-columns:1fr 180px;
  gap:10px;
}

.filters{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:14px;
}

.filter-btn{
  width:auto;
  margin:0;
  padding:8px 11px;
  background:rgba(255,255,255,0.08);
  font-size:13px;
}

.filter-btn.active{
  background:var(--accent);
}

.task{
  display:flex;
  gap:12px;
  align-items:flex-start;
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.task:last-child{border-bottom:none}

.check{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.06);
  color:#fff;
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.check.done{
  background:var(--green);
}

.task-main{flex:1;min-width:0}

.task-title{
  font-size:15px;
  line-height:1.4;
}

.task-title.done{
  text-decoration:line-through;
  color:var(--muted);
}

.task-meta{
  margin-top:4px;
  font-size:12px;
  color:var(--muted);
}

.actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.small-btn{
  width:auto;
  margin:0;
  padding:7px 9px;
  border-radius:11px;
  background:rgba(255,255,255,0.10);
  font-size:12px;
}

.danger{background:rgba(239,68,68,0.18)}

.edit-box{
  margin-top:10px;
  padding-top:10px;
  border-top:1px dashed rgba(255,255,255,0.12);
}

.empty{
  color:var(--muted);
  padding:12px 0;
}

.notice{
  color:#bbb;
  min-height:18px;
  margin-top:10px;
}

@media(max-width:700px){
  .row{grid-template-columns:1fr;}
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <div class="topbar">
      <div>
        <h2 style="margin:0;">To Do</h2>
        <p class="muted" style="margin:6px 0 0;">Your ultimate task list. Done items move to the bottom.</p>
      </div>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <input id="taskInput" placeholder="Add a task">
      <select id="categoryInput">
        <option>Life</option>
        <option>Business</option>
        <option>Church</option>
        <option>Household</option>
        <option>Work</option>
        <option>Health</option>
        <option>Errands</option>
        <option>Admin</option>
      </select>
    </div>

    <button id="addBtn">Add task</button>
    <p id="msg" class="notice"></p>

    <div class="filters" id="filters"></div>
  </div>

  <div class="card">
    <div id="tasks"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      storage:localStorage
    }
  }
);

const taskInput = document.getElementById("taskInput");
const categoryInput = document.getElementById("categoryInput");
const addBtn = document.getElementById("addBtn");
const tasksEl = document.getElementById("tasks");
const msgEl = document.getElementById("msg");
const filtersEl = document.getElementById("filters");

const categories = ["All","Life","Business","Church","Household","Work","Health","Errands","Admin"];
let user = null;
let tasks = [];
let activeFilter = "All";

function setMsg(text){
  msgEl.textContent = text;
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function renderFilters(){
  filtersEl.innerHTML = categories.map(cat => `
    <button class="filter-btn ${activeFilter === cat ? "active" : ""}" onclick="setFilter('${cat}')">
      ${cat}
    </button>
  `).join("");
}

window.setFilter = function(cat){
  activeFilter = cat;
  render();
}

function sortedTasks(){
  let rows = [...tasks];

  if(activeFilter !== "All"){
    rows = rows.filter(t => (t.category || "Life") === activeFilter);
  }

  rows.sort((a,b) => {
    if(Boolean(a.done) !== Boolean(b.done)) return a.done ? 1 : -1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  return rows;
}

function render(){
  renderFilters();

  const rows = sortedTasks();

  if(!rows.length){
    tasksEl.innerHTML = `<div class="empty">No tasks here yet.</div>`;
    return;
  }

  tasksEl.innerHTML = rows.map(task => `
    <div class="task">
      <div class="check ${task.done ? "done" : ""}" onclick="toggleTask('${task.id}', ${task.done ? "false" : "true"})">
        ${task.done ? "✓" : ""}
      </div>

      <div class="task-main">
        <div class="task-title ${task.done ? "done" : ""}">
          ${task.title || ""}
        </div>
        <div class="task-meta">${task.category || "Life"}</div>

        <div class="actions" style="margin-top:8px;">
          <button class="small-btn" onclick="toggleEdit('${task.id}')">Edit</button>
          <button class="small-btn danger" onclick="deleteTask('${task.id}')">Delete</button>
        </div>

        <div id="edit-${task.id}" class="edit-box" style="display:none;">
          <input id="edit-title-${task.id}" value="${(task.title || "").replace(/"/g, '&quot;')}">
          <select id="edit-category-${task.id}">
            ${categories.filter(c => c !== "All").map(cat => `
              <option ${task.category === cat ? "selected" : ""}>${cat}</option>
            `).join("")}
          </select>
          <button class="small-btn" style="margin-top:10px;" onclick="saveEdit('${task.id}')">Save changes</button>
        </div>
      </div>
    </div>
  `).join("");
}

async function load(){
  user = await getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  const { data, error } = await supabase
    .from("tasks")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at", { ascending:false });

  if(error){
    setMsg(error.message);
    return;
  }

  tasks = data || [];
  render();
}

addBtn.addEventListener("click", async () => {
  const title = taskInput.value.trim();
  const category = categoryInput.value;

  if(!title){
    setMsg("Type a task first.");
    return;
  }

  const { error } = await supabase
    .from("tasks")
    .insert([{
      user_id:user.id,
      title,
      category,
      done:false
    }]);

  if(error){
    setMsg(error.message);
    return;
  }

  taskInput.value = "";
  setMsg("Task added.");
  await load();
});

taskInput.addEventListener("keydown", e => {
  if(e.key === "Enter") addBtn.click();
});

window.toggleTask = async function(id, done){
  const { error } = await supabase
    .from("tasks")
    .update({ done })
    .eq("id", id);

  if(error){
    setMsg(error.message);
    return;
  }

  await load();
}

window.toggleEdit = function(id){
  const box = document.getElementById(`edit-${id}`);
  if(!box) return;
  box.style.display = box.style.display === "none" ? "block" : "none";
}

window.saveEdit = async function(id){
  const title = document.getElementById(`edit-title-${id}`).value.trim();
  const category = document.getElementById(`edit-category-${id}`).value;

  if(!title){
    setMsg("Task cannot be empty.");
    return;
  }

  const { error } = await supabase
    .from("tasks")
    .update({ title, category })
    .eq("id", id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Task updated.");
  await load();
}

window.deleteTask = async function(id){
  const { error } = await supabase
    .from("tasks")
    .delete()
    .eq("id", id);

  if(error){
    setMsg(error.message);
    return;
  }

  setMsg("Task deleted.");
  await load();
}

load();
</script>
</body>
</html>
