<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0f1115">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate To Do</title>
  <style>
    :root{
      --bg1:#0f1115;
      --bg2:#171a20;
      --panel:rgba(255,255,255,0.06);
      --panel-strong:rgba(255,255,255,0.08);
      --line:rgba(255,255,255,0.10);
      --text:#f5f7fb;
      --muted:#a7afbe;
      --accent:#ff3b30;
      --green:#22c55e;
      --shadow:0 20px 50px rgba(0,0,0,0.35);
      --blur:18px;
      --radius:22px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      padding:18px;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 26%),
        radial-gradient(circle at top right, rgba(255,59,48,0.10), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .glass{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
    }

    .card{
      padding:18px;
      margin-top:16px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .back-btn{
      width:auto;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.08);
      color:#fff;
      border:none;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
    }

    .muted{
      color:var(--muted);
    }

    .top-row{
      display:grid;
      grid-template-columns:1fr 220px;
      gap:10px;
      margin-top:10px;
    }

    input, select, button {
      box-sizing: border-box;
      font: inherit;
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      color:#fff;
      border:1px solid rgba(255,255,255,0.10);
    }

    input::placeholder{
      color:#9da6b5;
    }

    button {
      background: var(--accent);
      border: none;
      font-weight: 700;
      cursor: pointer;
    }

    .add-btn{
      margin-top:12px;
    }

    .notice {
      color: #bbb;
      margin-top: 10px;
      white-space: pre-wrap;
    }

    .section {
      margin-top: 24px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
      letter-spacing:-0.02em;
    }

    .task-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background:var(--panel-strong);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
      margin-top: 10px;
    }

    .task-check {
      width: 18px;
      height: 18px;
      margin-top: 4px;
      flex: 0 0 auto;
      accent-color: var(--green);
    }

    .task-main {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
    }

    .task-text.done {
      text-decoration: line-through;
      opacity: 0.58;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .mini-btn {
      width: auto;
      margin: 0;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.10);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }

    .delete-btn {
      width: 34px;
      height: 34px;
      min-width: 34px;
      padding: 0;
      margin: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      color: #fff;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .edit-form {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed rgba(255,255,255,0.12);
    }

    .empty-text {
      color: var(--muted);
      font-size: 14px;
      padding: 4px 0 0;
    }

    @media (max-width: 700px) {
      .top-row {
        grid-template-columns: 1fr;
      }

      body{
        padding:14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glass card">
      <div class="topbar">
        <div>
          <h2 style="margin:0;">Ultimate To Do List</h2>
          <p class="muted" style="margin:6px 0 0 0;">Grouped by life area, with edit support.</p>
        </div>
        <a class="back-btn" href="dashboard.html">← Dashboard</a>
      </div>

      <div class="top-row">
        <input id="taskInput" placeholder="Enter task" />
        <select id="taskCategory">
          <option value="Life">Life</option>
          <option value="House">House</option>
          <option value="Money">Money</option>
          <option value="Business">Business</option>
          <option value="Work">Work</option>
        </select>
      </div>

      <button class="add-btn" onclick="addTask()">Add Task</button>

      <p id="msg" class="notice"></p>

      <div id="taskSections"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      "https://grgagroautlpphjsjpjh.supabase.co",
      "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      }
    );

    const taskInput = document.getElementById("taskInput");
    const taskCategory = document.getElementById("taskCategory");
    const msg = document.getElementById("msg");
    const taskSections = document.getElementById("taskSections");

    const sectionOrder = ["Life", "House", "Money", "Business", "Work"];

    async function getUser() {
      const { data } = await supabase.auth.getUser();
      return data.user;
    }

    window.addTask = async function () {
      const user = await getUser();
      const title = taskInput.value.trim();
      const category = taskCategory.value;

      if (!user) {
        msg.textContent = "Not logged in.";
        return;
      }

      if (!title) {
        msg.textContent = "Enter a task.";
        return;
      }

      const { error } = await supabase.from("tasks").insert([{
        user_id: user.id,
        title,
        category,
        status: "open"
      }]);

      if (error) {
        msg.textContent = error.message;
        return;
      }

      taskInput.value = "";
      msg.textContent = "";
      loadTasks();
    };

    window.toggleTask = async function (id, status) {
      const newStatus = status === "done" ? "open" : "done";

      const { error } = await supabase
        .from("tasks")
        .update({ status: newStatus })
        .eq("id", id);

      if (error) {
        msg.textContent = error.message;
        return;
      }

      loadTasks();
    };

    window.deleteTask = async function (id) {
      const { error } = await supabase
        .from("tasks")
        .delete()
        .eq("id", id);

      if (error) {
        msg.textContent = error.message;
        return;
      }

      loadTasks();
    };

    window.toggleEditTask = function (id) {
      const block = document.getElementById(`edit-${id}`);
      if (!block) return;
      block.style.display = block.style.display === "none" ? "block" : "none";
    };

    window.saveTaskEdit = async function (id) {
      const editTitle = document.getElementById(`edit-title-${id}`).value.trim();
      const editCategory = document.getElementById(`edit-category-${id}`).value;

      if (!editTitle) {
        msg.textContent = "Task text cannot be empty.";
        return;
      }

      const { error } = await supabase
        .from("tasks")
        .update({
          title: editTitle,
          category: editCategory
        })
        .eq("id", id);

      if (error) {
        msg.textContent = error.message;
        return;
      }

      msg.textContent = "Task updated.";
      loadTasks();
    };

    async function loadTasks() {
      const user = await getUser();

      if (!user) {
        taskSections.innerHTML = '<div class="notice">Not logged in.</div>';
        return;
      }

      const { data, error } = await supabase
        .from("tasks")
        .select("*")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      const tasks = data || [];

      taskSections.innerHTML = sectionOrder.map(section => {
        const sectionTasks = tasks.filter(task => (task.category || "Life") === section);

        return `
          <div class="section">
            <div class="section-title">${section}</div>
            ${
              sectionTasks.length === 0
                ? `<div class="empty-text">No tasks yet.</div>`
                : sectionTasks.map(task => `
                    <div class="task-row">
                      <input
                        class="task-check"
                        type="checkbox"
                        ${task.status === "done" ? "checked" : ""}
                        onchange="toggleTask('${task.id}','${task.status}')"
                      />

                      <div class="task-main">
                        <div class="task-text ${task.status === "done" ? "done" : ""}">
                          ${task.title}
                        </div>

                        <div class="task-actions">
                          <button class="mini-btn" onclick="toggleEditTask('${task.id}')">Edit</button>
                        </div>

                        <div id="edit-${task.id}" class="edit-form" style="display:none;">
                          <input
                            id="edit-title-${task.id}"
                            value="${(task.title || "").replace(/"/g, '&quot;')}"
                            placeholder="Task text"
                          />
                          <select id="edit-category-${task.id}">
                            ${sectionOrder.map(option => `
                              <option value="${option}" ${task.category === option ? "selected" : ""}>${option}</option>
                            `).join("")}
                          </select>
                          <button class="mini-btn" onclick="saveTaskEdit('${task.id}')">Save changes</button>
                        </div>
                      </div>

                      <button
                        class="delete-btn"
                        onclick="deleteTask('${task.id}')"
                        aria-label="Delete task"
                        title="Delete"
                      >
                        ×
                      </button>
                    </div>
                  `).join("")
            }
          </div>
        `;
      }).join("");
    }

    loadTasks();
  </script>
</body>
</html>
