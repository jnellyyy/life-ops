<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pace Lists</title>

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">
<meta name="theme-color" content="#050507">

<style>
:root{
  --bg:#050507;
  --card:#1c1d21;
  --sheet:#111216;
  --line:rgba(255,255,255,.12);
  --text:#f5f5f7;
  --muted:#8e8e93;
  --accent:#ff3b30;
  --green:#22c55e;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{max-width:100%;overflow-x:hidden}

body{
  margin:0;
  min-height:100vh;
  padding:22px;
  padding-bottom:100px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}

.page{
  width:100%;
  max-width:1180px;
  margin:0 auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:38px;
}

.circle-btn{
  width:54px;
  height:54px;
  border-radius:50%;
  border:1px solid var(--line);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  flex:0 0 auto;
}

h1{
  font-size:44px;
  margin:0;
  letter-spacing:-.06em;
  line-height:1;
}

.count{
  color:var(--muted);
  margin-top:8px;
  font-size:18px;
}

.grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
  gap:28px 20px;
  margin-top:34px;
}

.note-card{
  min-width:0;
  cursor:pointer;
}

.preview{
  width:100%;
  aspect-ratio:1.45 / 1;
  min-height:116px;
  max-height:150px;
  border-radius:14px;
  background:var(--card);
  border:1px solid rgba(255,255,255,.16);
  padding:12px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}

.preview-title{
  font-size:12px;
  font-weight:800;
  margin-bottom:7px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.preview-line{
  font-size:10px;
  color:#c7c7cc;
  line-height:1.45;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.preview-section{
  font-size:10px;
  font-weight:800;
  color:#fff;
  margin-top:5px;
}

.note-title{
  margin-top:12px;
  font-size:19px;
  line-height:1.12;
  text-align:center;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  word-break:break-word;
}

.note-date{
  color:var(--muted);
  font-size:15px;
  text-align:center;
  margin-top:4px;
}

.bottom-bar{
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  width:calc(100% - 36px);
  max-width:760px;
  display:flex;
  gap:14px;
  align-items:center;
  z-index:5;
}

.search{
  flex:1;
  min-width:0;
  height:58px;
  border-radius:999px;
  background:#1c1c1e;
  border:1px solid var(--line);
  color:#fff;
  padding:0 18px;
  font-size:20px;
}

.add-btn{
  width:58px;
  height:58px;
  border-radius:50%;
  background:#1c1c1e;
  border:1px solid var(--line);
  color:#fff;
  font-size:28px;
  flex:0 0 auto;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  display:none;
  align-items:flex-end;
  z-index:10;
}

.sheet{
  width:100%;
  max-height:92vh;
  overflow:auto;
  background:var(--sheet);
  border-radius:28px 28px 0 0;
  padding:22px;
  border-top:1px solid var(--line);
}

.sheet-inner{
  width:100%;
  max-width:720px;
  margin:0 auto;
}

.sheet-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

input, textarea{
  width:100%;
  background:#1c1d21;
  border:1px solid var(--line);
  color:#fff;
  border-radius:16px;
  padding:14px;
  font:inherit;
  margin-top:10px;
}

textarea{
  min-height:130px;
  resize:vertical;
  line-height:1.45;
}

button{
  margin-top:12px;
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-weight:800;
  font:inherit;
}

.secondary{background:rgba(255,255,255,.10)}
.danger{background:rgba(239,68,68,.22)}

.section-title{
  margin-top:18px;
  margin-bottom:6px;
  font-size:14px;
  font-weight:900;
  color:#fff;
  text-transform:lowercase;
  letter-spacing:.01em;
}

.item-row{
  display:flex;
  align-items:flex-start;
  gap:10px;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
  cursor:pointer;
}

.check{
  width:28px;
  height:28px;
  border-radius:50%;
  border:1px solid var(--line);
  background:rgba(255,255,255,.06);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 auto;
}

.check.done{background:var(--green)}

.item-text{
  flex:1;
  min-width:0;
  line-height:1.4;
  word-break:break-word;
}

.item-text.done{
  text-decoration:line-through;
  color:var(--muted);
}

.delete-small{
  width:auto;
  padding:7px 10px;
  border-radius:10px;
  background:rgba(239,68,68,.18);
  margin-top:0;
  font-size:12px;
  flex:0 0 auto;
}

.status{
  color:var(--muted);
  min-height:18px;
  font-size:13px;
  margin-top:10px;
}

.divider{
  height:1px;
  background:rgba(255,255,255,.08);
  margin:18px 0 8px;
}

@media(max-width:520px){
  body{padding:18px;padding-bottom:100px}
  h1{font-size:40px}
  .grid{grid-template-columns:repeat(2, minmax(0, 1fr));gap:24px 14px}
  .preview{min-height:110px}
  .note-title{font-size:18px}
}
</style>
</head>

<body>

<div class="page">
  <div class="top">
    <a href="dashboard.html" class="circle-btn">‹</a>
    <button class="circle-btn" onclick="openNew()">＋</button>
  </div>

  <h1>Lists</h1>
  <div class="count" id="count">0 lists</div>

  <div class="grid" id="notesGrid"></div>
</div>

<div class="bottom-bar">
  <input id="search" class="search" placeholder="Search" oninput="render()">
  <button class="add-btn" onclick="openNew()">✎</button>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <div class="sheet-inner">
      <div class="sheet-top">
        <button class="circle-btn" style="width:44px;height:44px;font-size:22px;margin:0;" onclick="closeModal()">×</button>
      </div>

      <input id="listTitle" placeholder="Main list title e.g. Marvin + Blessing Wedding">
      <button onclick="saveListTitle()">Save main list title</button>

      <div class="divider"></div>

      <textarea id="quickPasteList" placeholder="Paste a section here, for example:

admin

• pre consultation form completed
• both client emails received
• docusign contract sent"></textarea>

      <button class="secondary" onclick="importSection()">Import section</button>

      <div id="itemsWrap" style="margin-top:16px;"></div>

      <input id="newSectionName" placeholder="Section e.g. admin / payments / gear">
      <input id="newItemText" placeholder="Add checklist item">
      <button onclick="addItem()">Add item</button>

      <button class="danger" onclick="deleteList()">Delete whole list</button>

      <div id="status" class="status"></div>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
  {
    auth:{
      persistSession:true,
      autoRefreshToken:true,
      detectSessionInUrl:true,
      storage:localStorage
    }
  }
);

const notesGrid = document.getElementById("notesGrid");
const countEl = document.getElementById("count");
const modal = document.getElementById("modal");
const listTitle = document.getElementById("listTitle");
const quickPasteList = document.getElementById("quickPasteList");
const newSectionName = document.getElementById("newSectionName");
const newItemText = document.getElementById("newItemText");
const itemsWrap = document.getElementById("itemsWrap");
const searchEl = document.getElementById("search");
const statusEl = document.getElementById("status");

let user = null;
let lists = [];
let items = [];
let activeId = null;

function setStatus(text){
  statusEl.textContent = text;
}

async function getUser(){
  const { data } = await supabase.auth.getUser();
  return data.user;
}

function formatDate(value){
  if(!value) return "";
  return new Date(value).toLocaleDateString("en-GB");
}

function cleanBullet(line){
  return line
    .replace(/^[-*•◦▪▫‣]\s*/, "")
    .replace(/^\[[ xX]\]\s*/, "")
    .trim();
}

function itemsFor(listId){
  return items.filter(i => i.list_id === listId);
}

function groupItems(listId){
  const grouped = {};
  itemsFor(listId).forEach(item => {
    const section = item.section || "general";
    if(!grouped[section]) grouped[section] = [];
    grouped[section].push(item);
  });
  return grouped;
}

async function load(){
  user = await getUser();

  if(!user){
    window.location.href = "index.html";
    return;
  }

  const [listsRes, itemsRes] = await Promise.all([
    supabase
      .from("lists")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending:false }),

    supabase
      .from("list_items")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending:true })
  ]);

  if(listsRes.error){
    alert(listsRes.error.message);
    return;
  }

  if(itemsRes.error){
    alert(itemsRes.error.message);
    return;
  }

  lists = listsRes.data || [];
  items = itemsRes.data || [];
  render();
}

window.render = function(){
  const q = searchEl.value.toLowerCase();

  const filtered = lists.filter(list => {
    const listItems = itemsFor(list.id);
    return (
      (list.title || "").toLowerCase().includes(q) ||
      listItems.some(item =>
        (item.text || "").toLowerCase().includes(q) ||
        (item.section || "").toLowerCase().includes(q)
      )
    );
  });

  countEl.textContent = `${filtered.length} ${filtered.length === 1 ? "list" : "lists"}`;

  if(!filtered.length){
    notesGrid.innerHTML = `<div style="color:#8e8e93;">No lists yet.</div>`;
    return;
  }

  notesGrid.innerHTML = filtered.map(list => {
    const grouped = groupItems(list.id);
    const sections = Object.keys(grouped).slice(0,2);

    return `
      <div class="note-card" onclick="openList('${list.id}')">
        <div class="preview">
          <div class="preview-title">${list.title || "Untitled"}</div>
          ${
            sections.length
              ? sections.map(section => `
                  <div class="preview-section">${section}</div>
                  ${
                    grouped[section].slice(0,2).map(item => `
                      <div class="preview-line">${item.done ? "☑" : "☐"} ${item.text || ""}</div>
                    `).join("")
                  }
                `).join("")
              : `<div class="preview-line">No items yet</div>`
          }
        </div>
        <div class="note-title">${list.title || "Untitled"}</div>
        <div class="note-date">${formatDate(list.created_at)}</div>
      </div>
    `;
  }).join("");
}

function renderActiveItems(){
  if(!activeId){
    itemsWrap.innerHTML = `<div class="status">Save the main list title first, then import sections.</div>`;
    return;
  }

  const grouped = groupItems(activeId);
  const sections = Object.keys(grouped);

  if(!sections.length){
    itemsWrap.innerHTML = `<div class="status">No checklist items yet.</div>`;
    return;
  }

  itemsWrap.innerHTML = sections.map(section => `
    <div class="section-title">${section}</div>
    ${
      grouped[section].map(item => `
        <div class="item-row" onclick="toggleItem('${item.id}', ${item.done ? "false" : "true"})">
          <div class="check ${item.done ? "done" : ""}">
            ${item.done ? "✓" : ""}
          </div>

          <div class="item-text ${item.done ? "done" : ""}">
            ${item.text || ""}
          </div>

          <button class="delete-small" onclick="event.stopPropagation(); deleteItem('${item.id}')">Delete</button>
        </div>
      `).join("")
    }
  `).join("");
}

window.openNew = function(){
  activeId = null;
  listTitle.value = "";
  quickPasteList.value = "";
  newSectionName.value = "";
  newItemText.value = "";
  setStatus("");
  renderActiveItems();
  modal.style.display = "flex";
  setTimeout(() => listTitle.focus(), 150);
}

window.openList = function(id){
  const list = lists.find(l => l.id === id);
  if(!list) return;

  activeId = id;
  listTitle.value = list.title || "";
  quickPasteList.value = "";
  newSectionName.value = "";
  newItemText.value = "";
  setStatus("");
  renderActiveItems();
  modal.style.display = "flex";
  setTimeout(() => quickPasteList.focus(), 150);
}

window.closeModal = function(){
  modal.style.display = "none";
  activeId = null;
}

window.saveListTitle = async function(){
  const title = listTitle.value.trim() || "Untitled";

  if(activeId){
    const { error } = await supabase
      .from("lists")
      .update({ title })
      .eq("id", activeId);

    if(error){
      setStatus(error.message);
      return;
    }

    setStatus("Main list title saved.");
  } else {
    const { data, error } = await supabase
      .from("lists")
      .insert([{ user_id:user.id, title }])
      .select()
      .single();

    if(error){
      setStatus(error.message);
      return;
    }

    activeId = data.id;
    setStatus("Main list created. Now import a section.");
  }

  await load();
  renderActiveItems();
}

window.importSection = async function(){
  const raw = quickPasteList.value.trim();

  if(!activeId){
    setStatus("Save the main list title first.");
    return;
  }

  if(!raw){
    setStatus("Paste a section first.");
    return;
  }

  const lines = raw
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean);

  if(lines.length < 2){
    setStatus("Use first line as subheading, then bullet points underneath.");
    return;
  }

  const section = cleanBullet(lines[0]).toLowerCase() || "general";

  const bulletItems = lines
    .slice(1)
    .map(cleanBullet)
    .filter(Boolean);

  if(!bulletItems.length){
    setStatus("Add bullet points under the subheading.");
    return;
  }

  const itemsToInsert = bulletItems.map(item => ({
    user_id:user.id,
    list_id:activeId,
    section,
    text:item,
    done:false
  }));

  const { error } = await supabase
    .from("list_items")
    .insert(itemsToInsert);

  if(error){
    setStatus(error.message);
    return;
  }

  quickPasteList.value = "";
  setStatus(`Section "${section}" imported.`);
  await load();
  renderActiveItems();
  quickPasteList.focus();
}

window.addItem = async function(){
  const text = newItemText.value.trim();
  const section = (newSectionName.value.trim() || "general").toLowerCase();

  if(!activeId){
    setStatus("Save the main list title first.");
    return;
  }

  if(!text){
    setStatus("Type an item first.");
    return;
  }

  const { error } = await supabase
    .from("list_items")
    .insert([{
      user_id:user.id,
      list_id:activeId,
      section,
      text,
      done:false
    }]);

  if(error){
    setStatus(error.message);
    return;
  }

  newItemText.value = "";
  setStatus("Item added.");
  await load();
  renderActiveItems();
  newItemText.focus();
}

window.toggleItem = async function(id, done){
  const { error } = await supabase
    .from("list_items")
    .update({ done })
    .eq("id", id);

  if(error){
    setStatus(error.message);
    return;
  }

  await load();
  renderActiveItems();
}

window.deleteItem = async function(id){
  const { error } = await supabase
    .from("list_items")
    .delete()
    .eq("id", id);

  if(error){
    setStatus(error.message);
    return;
  }

  await load();
  renderActiveItems();
}

window.deleteList = async function(){
  if(!activeId){
    closeModal();
    return;
  }

  const ok = confirm("Delete this whole list?");
  if(!ok) return;

  const { error } = await supabase
    .from("lists")
    .delete()
    .eq("id", activeId);

  if(error){
    setStatus(error.message);
    return;
  }

  closeModal();
  await load();
}

newItemText.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    addItem();
  }
});

listTitle.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    saveListTitle();
  }
});

load();
</script>

</body>
</html>
