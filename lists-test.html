<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Pace Lists</title>

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">

<style>
:root{
  --bg:#0f1115;
  --card:#1a1d23;
  --line:rgba(255,255,255,0.08);
  --text:#fff;
  --muted:#aaa;
  --accent:#ff3b30;
}

body{
  margin:0;
  padding:18px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont;
}

.wrap{max-width:1000px;margin:auto;}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back{
  text-decoration:none;
  color:#fff;
  font-weight:700;
}

.add{
  background:var(--accent);
  border:none;
  padding:10px 14px;
  border-radius:12px;
  color:#fff;
  font-weight:800;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  margin-top:20px;
}

.note{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  border:1px solid var(--line);
  min-height:120px;
  cursor:pointer;
}

.note-title{
  font-weight:800;
  font-size:14px;
}

.note-preview{
  font-size:12px;
  color:var(--muted);
  margin-top:6px;
  line-height:1.4;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:flex-end;
}

.sheet{
  background:#13151b;
  width:100%;
  border-radius:24px 24px 0 0;
  padding:20px;
}

input,textarea{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#1f232a;
  border:none;
  color:#fff;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:800;
}

.save{background:var(--accent);}
.delete{background:#333;}
</style>
</head>

<body>
<div class="wrap">

  <div class="top">
    <a href="dashboard.html" class="back">← Dashboard</a>
    <button class="add" onclick="newNote()">+ New</button>
  </div>

  <h1>Quick Lists</h1>

  <div id="grid" class="grid"></div>

</div>

<div class="modal" id="modal">
  <div class="sheet">
    <input id="title" placeholder="Title">
    <textarea id="content" rows="6" placeholder="Write your list..."></textarea>

    <button class="save" onclick="saveNote()">Save</button>
    <button class="delete" onclick="deleteNote()">Delete</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
  "https://grgagroautlpphjsjpjh.supabase.co",
  "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn"
);

let user, notes=[], activeId=null;

const grid = document.getElementById("grid");

async function init(){
  const { data } = await supabase.auth.getUser();
  user = data.user;
  if(!user) location.href="index.html";
  load();
}

async function load(){
  const { data } = await supabase
    .from("lists")
    .select("*")
    .eq("user_id", user.id)
    .order("created_at",{ascending:false});

  notes = data || [];
  render();
}

function render(){
  grid.innerHTML = notes.map(n => `
    <div class="note" onclick="openNote('${n.id}')">
      <div class="note-title">${n.title || "Untitled"}</div>
      <div class="note-preview">${(n.content||"").slice(0,80)}</div>
    </div>
  `).join("");
}

window.newNote = ()=>{
  activeId=null;
  title.value="";
  content.value="";
  modal.style.display="flex";
}

window.openNote = id=>{
  const n = notes.find(x=>x.id===id);
  activeId=id;
  title.value=n.title;
  content.value=n.content;
  modal.style.display="flex";
}

window.closeModal = ()=> modal.style.display="none";

window.saveNote = async ()=>{
  if(activeId){
    await supabase.from("lists")
      .update({title:title.value, content:content.value})
      .eq("id",activeId);
  } else {
    await supabase.from("lists")
      .insert([{user_id:user.id,title:title.value,content:content.value}]);
  }
  closeModal();
  load();
}

window.deleteNote = async ()=>{
  if(!activeId) return closeModal();
  await supabase.from("lists").delete().eq("id",activeId);
  closeModal();
  load();
}

init();
</script>

</body>
</html>
