<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pace Reminders</title>

<link rel="manifest" href="/Pace/site.webmanifest">
<link rel="apple-touch-icon" href="/Pace/icon-180.png">
<link rel="icon" href="/Pace/icon-32.png">
<meta name="theme-color" content="#050507">

<style>
:root{
  --bg:#050507;
  --card:#1c1c1e;
  --card2:#24262b;
  --line:rgba(255,255,255,.12);
  --text:#f5f5f7;
  --muted:#8e8e93;
  --blue:#409cff;
  --red:#ff3b30;
  --orange:#ff9f0a;
  --grey:#8e8e93;
  --green:#34c759;
  --pink:#ff2d55;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  min-height:100vh;
  padding:22px;
  padding-bottom:110px;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}

.page{
  max-width:1050px;
  margin:0 auto;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.circle-btn{
  width:54px;
  height:54px;
  border-radius:50%;
  border:1px solid var(--line);
  background:rgba(255,255,255,.08);
  color:white;
  font-size:26px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
}

h1{
  font-size:46px;
  margin:0 0 20px;
  letter-spacing:-.06em;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.summary-card{
  border-radius:22px;
  padding:20px;
  min-height:105px;
  color:white;
  position:relative;
  overflow:hidden;
}

.summary-card h2{
  margin:32px 0 0;
  font-size:22px;
}

.summary-card .num{
  position:absolute;
  right:20px;
  top:18px;
  font-size:34px;
  font-weight:800;
}

.today{background:linear-gradient(135deg,#5ba8ff,#7bbcff)}
.scheduled{background:linear-gradient(135deg,#e57373,#df7f85)}
.all{background:linear-gradient(135deg,#333,#555)}
.overdue{background:linear-gradient(135deg,#ff3b30,#ff6b5f)}
.completed{background:linear-gradient(135deg,#8e9aa3,#aeb7bf)}
.manual{background:linear-gradient(135deg,#f59e0b,#fbbf24)}

.section-title{
  font-size:28px;
  margin:34px 0 14px;
  letter-spacing:-.04em;
}

.list-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  overflow:hidden;
}
