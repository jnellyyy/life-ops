<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pace Creators</title>
  <link rel="manifest" href="/Pace/site.webmanifest">
  <link rel="apple-touch-icon" href="/Pace/icon-180.png">
  <link rel="icon" href="/Pace/icon-32.png">
  <meta name="theme-color" content="#0f1115">
  <style>
    :root{
      --bg1:#0f1115;
      --bg2:#171a20;
      --panel:rgba(255,255,255,0.06);
      --panel-strong:rgba(255,255,255,0.08);
      --line:rgba(255,255,255,0.10);
      --text:#f5f7fb;
      --muted:#a7afbe;
      --accent:#ff3b30;
      --green:#22c55e;
      --red:#ef4444;
      --blue:#60a5fa;
      --amber:#f59e0b;
      --purple:#a855f7;
      --shadow:0 20px 50px rgba(0,0,0,0.35);
      --blur:18px;
      --radius:24px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      padding:18px;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 26%),
        radial-gradient(circle at top right, rgba(255,59,48,0.08), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .wrap{
      max-width:1220px;
      margin:0 auto;
    }

    .glass{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      backdrop-filter:blur(var(--blur));
      -webkit-backdrop-filter:blur(var(--blur));
      box-shadow:var(--shadow);
    }

    .card{
      padding:18px;
      margin-top:16px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .back-btn{
      width:auto;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.08);
      color:#fff;
      border:none;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      display:inline-block;
    }

    .muted{ color:var(--muted); }
    .notice{ color:#bbb; white-space:pre-wrap; margin-top:10px; min-height:18px; }
    .success{ color:#8ff0b2; }

    .settings-grid{
      display:grid;
      grid-template-columns:1fr 1fr 1fr auto;
      gap:10px;
      align-items:end;
    }

    .kpis{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:12px;
      margin-top:12px;
    }

    .kpi{
      background:var(--panel-strong);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:14px;
    }

    .kpi-title{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }

    .kpi-value{
      font-size:22px;
      font-weight:700;
      letter-spacing:-0.03em;
    }

    .good{ color:var(--green); }
    .bad{ color:var(--red); }
    .blue{ color:var(--blue); }
    .amber{ color:var(--amber); }
    .purple{ color:var(--purple); }

    .split{
      display:grid;
      grid-template-columns:0.95fr 1.05fr;
      gap:16px;
      margin-top:16px;
    }

    .subcard{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:16px;
      margin-top:14px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .row-3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    input, select, button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      color:#fff;
      font:inherit;
    }

    input::placeholder{
      color:#9da6b5;
    }

    button{
      background:var(--accent);
      border:none;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, opacity .12s ease;
    }

    button:hover{ transform:translateY(-1px); }
    button:active{ transform:translateY(0); opacity:0.92; }

    .small-btn{
      width:auto;
      margin:0;
      padding:8px 10px;
      background:rgba(255,255,255,0.10);
      font-size:13px;
      border-radius:12px;
    }

    .danger-btn{ background:rgba(239,68,68,0.18); }
    .save-btn{ background:rgba(34,197,94,0.22); }

    .progress-wrap{ margin-top:12px; }
    .progress-label{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .progress-bar{
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      overflow:hidden;
    }
    .progress-fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--accent), #ff6b63);
      width:0%;
      transition:width .25s ease;
    }

    .item{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .item:last-child{ border-bottom:none; }

    .item-title{
      font-weight:700;
      margin-bottom:4px;
    }

    .item-meta{
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .item-money{
      font-weight:700;
      white-space:nowrap;
    }

    .inline-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .edit-box{
      margin-top:10px;
      padding-top:10px;
      border-top:1px dashed rgba(255,255,255,0.12);
    }

    .empty{
      color:var(--muted);
      padding:8px 0 2px;
    }

    .pill{
      display:inline-block;
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      color:#fff;
      margin-top:6px;
    }

    .pill-below{ background:rgba(34,197,94,0.85); }
    .pill-over{ background:rgba(239,68,68,0.85); }

    @media (max-width:1100px){
      .split,
      .kpis,
      .settings-grid,
      .row,
      .row-3{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="glass card">
      <div class="topbar">
        <div>
          <h2 style="margin:0;">Pace Creators</h2>
          <p class="muted" style="margin:6px 0 0 0;">Live target, order log, tax-year total and suggested set-aside in one place.</p>
        </div>
        <a class="back-btn" href="dashboard.html">← Dashboard</a>
      </div>

      <div class="settings-grid">
        <input id="targetAmount" type="number" placeholder="Target amount e.g. 300">
        <input id="thresholdAmount" type="number" placeholder="Threshold e.g. 1000">
        <input id="setAsideRate" type="number" placeholder="Set-aside % e.g. 20">
        <button id="saveSettingsBtn" type="button">Save</button>
      </div>

      <p id="settingsMsg" class="notice"></p>

      <div class="kpis" id="kpis"></div>

      <div class="progress-wrap">
        <div class="progress-label">
          <span>Progress to target</span>
          <span id="progressText">£0 / £0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <div class="split">
      <div class="glass card">
        <div class="subcard" style="margin-top:0;">
          <h3 style="margin-bottom:6px;">Add earning</h3>
          <p class="muted" style="margin-bottom:0;">Add each order, or one weekly total if that is easier.</p>

          <div class="row">
            <input id="entryAmount" type="number" placeholder="Amount">
            <input id="entryDate" type="date">
          </div>

          <div class="row">
            <select id="entryMode">
              <option value="single">Single order</option>
              <option value="weekly">Weekly total</option>
              <option value="other">Other income</option>
            </select>
            <input id="entrySource" placeholder="Source e.g. Deliveroo, Weekly payout">
          </div>

          <input id="entryNote" placeholder="Note">
          <button id="saveEntryBtn" type="button">Add entry</button>
          <p id="msg" class="notice"></p>
        </div>
      </div>

      <div class="glass card">
        <div class="subcard" style="margin-top:0;">
          <h3 style="margin-bottom:6px;">Income log</h3>
          <div id="entriesList"></div>
        </div>
      </div>
    </div>

  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const OWNER_EMAIL = "janelle.lamptey@gmail.com";

    const supabase = createClient(
      "https://grgagroautlpphjsjpjh.supabase.co",
      "sb_publishable_bMxF7jf1q1EwpacieP62DQ_i8D9JPbn",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          storage: localStorage
        }
      }
    );

    const targetAmountEl = document.getElementById("targetAmount");
    const thresholdAmountEl = document.getElementById("thresholdAmount");
    const setAsideRateEl = document.getElementById("setAsideRate");
    const saveSettingsBtn = document.getElementById("saveSettingsBtn");
    const settingsMsgEl = document.getElementById("settingsMsg");

    const entryAmountEl = document.getElementById("entryAmount");
    const entryDateEl = document.getElementById("entryDate");
    const entryModeEl = document.getElementById("entryMode");
    const entrySourceEl = document.getElementById("entrySource");
    const entryNoteEl = document.getElementById("entryNote");
    const saveEntryBtn = document.getElementById("saveEntryBtn");
    const msgEl = document.getElementById("msg");

    const kpisEl = document.getElementById("kpis");
    const entriesListEl = document.getElementById("entriesList");
    const progressFillEl = document.getElementById("progressFill");
    const progressTextEl = document.getElementById("progressText");

    let settings = {
      target_amount: 0,
      threshold_amount: 1000,
      set_aside_rate: 20
    };

    let entries = [];

    function money(v){
      return `£${Number(v || 0).toFixed(2)}`;
    }

    function setMsg(text, good=false){
      msgEl.textContent = text;
      msgEl.className = good ? "notice success" : "notice";
    }

    function setSettingsMsg(text, good=false){
      settingsMsgEl.textContent = text;
      settingsMsgEl.className = good ? "notice success" : "notice";
    }

    function todayString(){
      return new Date().toISOString().split("T")[0];
    }

    function getTaxYearRange(date = new Date()) {
      const year = date.getFullYear();
      const taxYearStartThisYear = new Date(year, 3, 6);
      if (date >= taxYearStartThisYear) {
        return {
          start: new Date(year, 3, 6),
          end: new Date(year + 1, 3, 5),
          label: `${year}/${String(year + 1).slice(-2)}`
        };
      }
      return {
        start: new Date(year - 1, 3, 6),
        end: new Date(year, 3, 5),
        label: `${year - 1}/${String(year).slice(-2)}`
      };
    }

    function inTaxYear(entryDateStr) {
      if (!entryDateStr) return false;
      const taxYear = getTaxYearRange(new Date());
      const d = new Date(entryDateStr + "T00:00:00");
      return d >= taxYear.start && d <= taxYear.end;
    }

    function calculateFigures() {
      const target = Number(settings.target_amount || 0);
      const threshold = Number(settings.threshold_amount || 1000);
      const setAsideRate = Number(settings.set_aside_rate || 20);

      const totalMade = entries.reduce((sum, e) => sum + Number(e.amount || 0), 0);
      const leftToTarget = Math.max(target - totalMade, 0);
      const progress = target > 0 ? Math.min((totalMade / target) * 100, 100) : 0;
      const entryCount = entries.length;

      const taxYear = getTaxYearRange(new Date());
      const taxYearTotal = entries
        .filter(e => inTaxYear(e.entry_date))
        .reduce((sum, e) => sum + Number(e.amount || 0), 0);

      const overThreshold = taxYearTotal >= threshold;
      const thresholdLeft = Math.max(threshold - taxYearTotal, 0);
      const setAsideSoFar = taxYearTotal * (setAsideRate / 100);

      return {
        target,
        threshold,
        setAsideRate,
        totalMade,
        leftToTarget,
        progress,
        entryCount,
        taxYearTotal,
        overThreshold,
        thresholdLeft,
        setAsideSoFar,
        taxYearLabel: taxYear.label
      };
    }

    function renderKpis() {
      const f = calculateFigures();

      kpisEl.innerHTML = `
        <div class="kpi">
          <div class="kpi-title">Target</div>
          <div class="kpi-value">${money(f.target)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Made so far</div>
          <div class="kpi-value good">${money(f.totalMade)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Left to target</div>
          <div class="kpi-value ${f.leftToTarget > 0 ? "amber" : "good"}">${money(f.leftToTarget)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Progress</div>
          <div class="kpi-value blue">${f.progress.toFixed(0)}%</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Tax year ${f.taxYearLabel}</div>
          <div class="kpi-value purple">${money(f.taxYearTotal)}</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Threshold</div>
          <div class="kpi-value ${f.overThreshold ? "bad" : "good"}">${f.overThreshold ? "Reached" : money(f.thresholdLeft) + " left"}</div>
          <div class="pill ${f.overThreshold ? "pill-over" : "pill-below"}">${money(f.threshold)} threshold</div>
        </div>
        <div class="kpi">
          <div class="kpi-title">Put aside so far</div>
          <div class="kpi-value amber">${money(f.setAsideSoFar)}</div>
          <div class="item-meta">${f.setAsideRate}% estimate</div>
        </div>
      `;

      progressTextEl.textContent = `${money(f.totalMade)} / ${money(f.target)}`;
      progressFillEl.style.width = `${f.progress}%`;
    }

    function renderEntries() {
      if (!entries.length) {
        entriesListEl.innerHTML = `<div class="empty">No entries yet.</div>`;
        return;
      }

      entriesListEl.innerHTML = entries.map(entry => `
        <div class="item">
          <div style="flex:1;min-width:0;">
            <div class="item-title">${entry.source || "Income entry"}</div>
            <div class="item-meta">${entry.entry_date || ""}${entry.note ? ` • ${entry.note}` : ""}${entry.mode ? ` • ${entry.mode}` : ""}</div>

            <div class="inline-actions">
              <button class="small-btn" onclick="toggleEntryEdit('${entry.id}')">Edit</button>
              <button class="small-btn danger-btn" onclick="deleteEntry('${entry.id}')">Delete</button>
            </div>

            <div id="entry-edit-${entry.id}" class="edit-box" style="display:none;">
              <div class="row">
                <input id="entry-edit-amount-${entry.id}" type="number" value="${Number(entry.amount || 0)}">
                <input id="entry-edit-date-${entry.id}" type="date" value="${entry.entry_date || ""}">
              </div>
              <div class="row">
                <select id="entry-edit-mode-${entry.id}">
                  <option value="single" ${entry.mode === "single" ? "selected" : ""}>Single order</option>
                  <option value="weekly" ${entry.mode === "weekly" ? "selected" : ""}>Weekly total</option>
                  <option value="other" ${entry.mode === "other" ? "selected" : ""}>Other income</option>
                </select>
                <input id="entry-edit-source-${entry.id}" value="${(entry.source || "").replace(/"/g, '&quot;')}" placeholder="Source">
              </div>
              <input id="entry-edit-note-${entry.id}" value="${(entry.note || "").replace(/"/g, '&quot;')}" placeholder="Note">
              <button class="small-btn save-btn" style="margin-top:10px;" onclick="saveEntryEdit('${entry.id}')">Save changes</button>
            </div>
          </div>

          <div class="item-money good">${money(entry.amount)}</div>
        </div>
      `).join("");
    }

    async function getUser() {
      const { data } = await supabase.auth.getUser();
      return data.user;
    }

    async function guardOwnerOnly() {
      const user = await getUser();

      if (!user) {
        window.location.href = "index.html";
        return null;
      }

      if ((user.email || "").toLowerCase() !== OWNER_EMAIL.toLowerCase()) {
        window.location.href = "dashboard.html";
        return null;
      }

      return user;
    }

    async function ensureSettingsColumns() {
      // no-op in frontend; just here for readability
    }

    async function loadSettings(userId) {
      const { data, error } = await supabase
        .from("creators_settings")
        .select("*")
        .eq("user_id", userId)
        .maybeSingle();

      if (error) {
        setSettingsMsg(error.message);
        return;
      }

      settings = {
        target_amount: Number(data?.target_amount || 0),
        threshold_amount: Number(data?.threshold_amount || 1000),
        set_aside_rate: Number(data?.set_aside_rate || 20)
      };

      targetAmountEl.value = settings.target_amount || "";
      thresholdAmountEl.value = settings.threshold_amount || "";
      setAsideRateEl.value = settings.set_aside_rate || "";
    }

    async function loadEntries(userId) {
      const { data, error } = await supabase
        .from("creators_entries")
        .select("*")
        .eq("user_id", userId)
        .order("entry_date", { ascending: false })
        .order("created_at", { ascending: false });

      if (error) {
        setMsg(error.message);
        return;
      }

      entries = data || [];
    }

    saveSettingsBtn.addEventListener("click", async () => {
      const user = await getUser();
      if (!user) return;

      const target = Number(targetAmountEl.value || 0);
      const threshold = Number(thresholdAmountEl.value || 1000);
      const setAsideRate = Number(setAsideRateEl.value || 20);

      const { error } = await supabase
        .from("creators_settings")
        .upsert([{
          user_id: user.id,
          target_amount: target,
          threshold_amount: threshold,
          set_aside_rate: setAsideRate
        }], { onConflict: "user_id" });

      if (error) {
        setSettingsMsg(error.message);
        return;
      }

      setSettingsMsg("Settings saved.", true);
      await initialise();
    });

    saveEntryBtn.addEventListener("click", async () => {
      const user = await getUser();
      if (!user) return;

      const amount = Number(entryAmountEl.value || 0);
      const entryDate = entryDateEl.value || todayString();
      const mode = entryModeEl.value;
      const source = entrySourceEl.value.trim();
      const note = entryNoteEl.value.trim();

      if (!amount) {
        setMsg("Enter an amount.");
        return;
      }

      const { error } = await supabase
        .from("creators_entries")
        .insert([{
          user_id: user.id,
          amount,
          entry_date: entryDate,
          mode,
          source: source || null,
          note: note || null
        }]);

      if (error) {
        setMsg(error.message);
        return;
      }

      entryAmountEl.value = "";
      entryDateEl.value = "";
      entryModeEl.value = "single";
      entrySourceEl.value = "";
      entryNoteEl.value = "";

      setMsg("Entry added.", true);
      await initialise();
    });

    window.toggleEntryEdit = function(id) {
      const box = document.getElementById(`entry-edit-${id}`);
      if (!box) return;
      box.style.display = box.style.display === "none" ? "block" : "none";
    };

    window.saveEntryEdit = async function(id) {
      const amount = Number(document.getElementById(`entry-edit-amount-${id}`).value || 0);
      const entryDate = document.getElementById(`entry-edit-date-${id}`).value || null;
      const mode = document.getElementById(`entry-edit-mode-${id}`).value;
      const source = document.getElementById(`entry-edit-source-${id}`).value.trim();
      const note = document.getElementById(`entry-edit-note-${id}`).value.trim();

      if (!amount) {
        setMsg("Amount is required.");
        return;
      }

      const { error } = await supabase
        .from("creators_entries")
        .update({
          amount,
          entry_date: entryDate,
          mode,
          source: source || null,
          note: note || null
        })
        .eq("id", id);

      if (error) {
        setMsg(error.message);
        return;
      }

      setMsg("Entry updated.", true);
      await initialise();
    };

    window.deleteEntry = async function(id) {
      const { error } = await supabase
        .from("creators_entries")
        .delete()
        .eq("id", id);

      if (error) {
        setMsg(error.message);
        return;
      }

      setMsg("Entry deleted.", true);
      await initialise();
    };

    async function initialise() {
      const user = await guardOwnerOnly();
      if (!user) return;

      await loadSettings(user.id);
      await loadEntries(user.id);

      renderKpis();
      renderEntries();
    }

    initialise();
  </script>
</body>
</html>
